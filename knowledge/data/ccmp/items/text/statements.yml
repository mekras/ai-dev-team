- id: CCMP-012
  source_id: CCMP
  item_id: CCMP-text
  status: вывод источника
  text: 'Качество программного обеспечения создаётся сочетанием практик: рецензирования,
    тестирования, отладки, рефакторинга, интеграции, измерений и управления конструированием.'
  excerpt: 'Качество программного обеспечения создаётся сочетанием практик: рецензирования,
    тестирования, отладки, рефакторинга, интеграции, измерений и управления конструированием.'
