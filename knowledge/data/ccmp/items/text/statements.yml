  status: наблюдение
  text: Проектирование при конструировании является эвристическим процессом, в котором
    нужно сочетать абстракцию, сокрытие информации, простоту, связность и низкое сцепление.
  excerpt: Проектирование при конструировании является эвристическим процессом, в
