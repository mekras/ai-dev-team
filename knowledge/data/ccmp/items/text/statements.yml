- id: CCMP-011
  source_id: CCMP
  item_id: CCMP-text
  status: наблюдение
  text: Управляющие структуры должны помогать читателю понять порядок выполнения,
    а глубокая вложенность и нестандартные переходы требуют отдельного обоснования.
  excerpt: Управляющие структуры должны помогать читателю понять порядок выполнения,
    а глубокая вложенность и нестандартные переходы требуют отдельного обоснования.
