  item_id: CCMP-text
  status: наблюдение
  text: Псевдокод и пошаговая разработка метода помогают отделять намерение алгоритма
    от синтаксиса языка и снижать риск преждевременной детализации.
  excerpt: Псевдокод и пошаговая разработка метода помогают отделять намерение алгоритма
    от синтаксиса языка и снижать риск преждевременной детализации.
