- id: CCMP-001
  source_id: CCMP
  item_id: CCMP-text
  status: наблюдение
  text: Конструирование включает не только написание кода, но и детальное проектирование,
    отладку, интеграцию и тестирование, выполняемое разработчиками.
  excerpt: Конструирование включает не только написание кода, но и детальное проектирование,
    отладку, интеграцию и тестирование, выполняемое разработчиками.
  artifact: code-complete-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-002
  source_id: CCMP
  item_id: CCMP-text
  status: вывод источника
  text: Качество конструирования существенно влияет на качество программного продукта,
    потому что исходный код часто остаётся самым точным описанием реализованной системы.
  excerpt: Качество конструирования существенно влияет на качество программного продукта,
    потому что исходный код часто остаётся самым точным описанием реализованной системы.
  artifact: code-complete-ru.txt
