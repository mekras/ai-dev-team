statements:
- id: CCMP-001
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Конструирование включает не только написание кода, но и детальное проектирование, отладку, интеграцию и тестирование, выполняемое разработчиками.
  excerpt: Сюда автор относит детальное проектирование, написание и правку кода, отладку, объединение готовых частей и проверку их разработчиком; собственно кодирование оказывается лишь одной операцией внутри более широкого набора инженерных действий.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-002
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: Качество конструирования существенно влияет на качество программного продукта, потому что исходный код часто остаётся самым точным описанием реализованной системы.
  excerpt: то, насколько добротно выполнено конструирование, прямо переносится на свойства готового продукта, ведь именно текст программы остаётся самым достоверным и подробным описанием воплощённой системы.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-003
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Перед началом существенного конструирования нужно проверить готовность определения проблемы, требований, архитектуры и выбранных методик разработки.
  excerpt: 'Прежде чем вкладывать силы в детали программы, стоит удостовериться, что готовы четыре опоры: ясно сформулирована решаемая задача, выявлены и согласованы требования, выбрана и продумана архитектура и определены основные методики, которыми команда будет вести разработку.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-004
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: Тип программного продукта и размер проекта меняют достаточный уровень формализации, предварительной подготовки, коммуникации и контроля качества.
  excerpt: От разновидности создаваемого продукта и от масштаба работ зависит, какая степень строгости, предварительной проработки, согласований между людьми и формальных проверок качества будет уместной.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-005
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Проектирование при конструировании является эвристическим процессом, в котором нужно сочетать абстракцию, сокрытие информации, простоту, связность и низкое сцепление.
  excerpt: 'Проектирование на уровне реализации он называет эвристическим: готового рецепта нет, а инженер балансирует между несколькими взаимными опорами — выделением абстракций, сокрытием внутренних подробностей, стремлением к простоте, высокой связностью внутри модулей и слабой зависимостью между ними.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-006
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Качество класса зависит от ясной абстракции, качественного интерфейса, ответственного распределения обязанностей и разумных причин для выделения класса.
  excerpt: 'Добротность класса автор выводит из нескольких связанных свойств: класс должен выражать понятную абстракцию, предлагать аккуратный интерфейс, разумно держать закреплённую за ним зону ответственности и вообще появляться на свет по оправданной причине.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-007
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Качество метода связано с его понятной целью, ограниченным объёмом, хорошим именем, аккуратной работой с параметрами и простым уровнем детализации.
  excerpt: Достойный метод имеет ясное назначение, удержан в разумном объёме, носит говорящее имя, бережно обращается со своими параметрами и держится одного уровня подробности.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-008
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Защитное программирование требует явно обрабатывать неправильные входные данные, ошибки, исключения и отладочные проверки, не превращая защиту в самостоятельный источник сложности.
  excerpt: Защитный стиль предполагает, что неверные входные значения, сбои, исключительные ситуации и проверки времени отладки разбираются открыто и осознанно.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-009
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Псевдокод и пошаговая разработка метода помогают отделять намерение алгоритма от синтаксиса языка и снижать риск преждевременной детализации.
  excerpt: Описание шагов на псевдокоде и пошаговое наращивание метода позволяют сначала зафиксировать намерение алгоритма отдельно от особенностей конкретного языка и лишь затем перевести замысел в синтаксис.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-010
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Переменная должна иметь единственную понятную цель, ограниченную область видимости, предсказуемую инициализацию и имя, отражающее её смысл.
  excerpt: Хорошая переменная служит одной понятной задаче, живёт в как можно более узкой области видимости, получает значение предсказуемым образом и носит имя, по которому сразу ясен её смысл.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-011
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Управляющие структуры должны помогать читателю понять порядок выполнения, а глубокая вложенность и нестандартные переходы требуют отдельного обоснования.
  excerpt: Условия, ветвления и циклы должны облегчать понимание того, в каком порядке выполняется программа.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-012
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: 'Качество программного обеспечения создаётся сочетанием практик: рецензирования, тестирования, отладки, рефакторинга, интеграции, измерений и управления конструированием.'
  excerpt: 'Добротность программы складывается из совместного действия многих методик: взаимного рецензирования и инспекций, разных видов проверки и тестирования, отладки, упорядоченного рефакторинга, продуманной интеграции, измерений и управления самим процессом конструирования.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-013
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Тестирование, выполняемое разработчиками, является частью конструирования и не заменяет другие формы контроля качества.
  excerpt: 'Проверка кода самим автором — часть работы по конструированию, и она ценна, однако автор отдельно предостерегает: она не отменяет рецензирования, независимой проверки и прочих уровней контроля качества.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-014
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: Отладка должна искать причину дефекта, а не только устранять видимый симптом; исправление дефекта требует проверки и предотвращения повторения похожих ошибок.
  excerpt: 'Полноценное устранение включает три части: найти подлинную причину, убедиться, что правка действительно её закрывает, и принять меры, чтобы похожий изъян не повторился.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-015
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Рефакторинг является управляемым способом эволюции кода и требует безопасности, проверок и понимания, какой вид улучшения выполняется.
  excerpt: 'Это управляемое преобразование, а не вольная переделка: оно опирается на страховку в виде проверок, выполняется небольшими шагами и требует ясного понимания, какое именно улучшение сейчас вносится.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-016
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Оптимизацию кода нужно основывать на оценке производительности и итерациях, а не на предположении о том, где находится узкое место.
  excerpt: 'Производительность стоит улучшать, отталкиваясь от измерений и работая итерациями: сначала измерить, найти настоящее узкое место, внести изменение, снова измерить.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-017
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Чем больше проект, тем сильнее растёт стоимость коммуникации, координации, интеграции и организационных мер, необходимых для сохранения управляемости.
  excerpt: Чем крупнее работа, тем стремительнее растут расходы на согласование между людьми, координацию, объединение частей и организационные меры, которые удерживают проект в управляемом состоянии.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-018
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: Интеграция требует осознанной стратегии и частоты; позднее объединение частей системы повышает риск обнаружения дорогих дефектов слишком поздно.
  excerpt: Подход к объединению частей и его частота должны быть продуманы заранее. Если откладывать объединение на потом, дорогие несоответствия между частями обнаруживаются слишком поздно, когда их исправление обходится дороже всего.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-019
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Инструменты разработки полезны, когда поддерживают проектирование, работу с исходным кодом, исполняемым кодом, проверками и повторяемостью процесса.
  excerpt: Средства разработки оправданы тогда, когда реально помогают проектировать, работать с исходным текстом, собирать и запускать исполняемый код, проводить проверки и делать процесс повторяемым.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-020
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: Форматирование, стиль, комментарии и самодокументирующийся код являются частью читабельности и сопровождения, а не только внешним оформлением.
  excerpt: Расстановка отступов, единый стиль, комментарии и самообъясняющий текст программы работают на читабельность и на удобство сопровождения — это часть инженерного качества, а не одно лишь украшение.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-021
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Профессиональное мастерство программиста требует постоянного развития, чтения, практики, обратной связи и осознанного выбора инженерных методов.
  excerpt: 'Зрелость профессионала автор связывает с непрерывным ростом: с чтением, постоянной практикой, готовностью получать и принимать обратную связь и с осознанным выбором инженерных приёмов под задачу.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-022
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: 'Требования, архитектура и конструирование связаны: недостатки ранних решений проявляются на уровне кода и увеличивают стоимость исправлений.'
  excerpt: 'Требования, архитектура и конструирование сцеплены между собой: слабости ранних решений не растворяются, а проступают на уровне готового текста программы и поднимают стоимость поздних исправлений.'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-023
  source_id: CCMP
  item_id: CCMP-text
  kind: inference
  status: verified
  text: Документы, код, комментарии и тесты должны поддерживать понимание системы совместно; один слой не должен компенсировать систематическую неясность другого.
  excerpt: 'описания, текст программы, комментарии и тесты призваны поддерживать понимание системы сообща: автор подчёркивает, что один из этих слоёв не должен прикрывать систематическую невнятность другого'
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CCMP-024
  source_id: CCMP
  item_id: CCMP-text
  kind: observation
  status: verified
  text: Кодовые соглашения и стандарты должны помогать команде читать, проверять и поддерживать код, а не существовать как автономная формальность.
  excerpt: Принятые в команде соглашения и стандарты оправданы тем, что облегчают чтение, проверку и сопровождение программы; стандарт, оторванный от этой пользы, вырождается в самодостаточную формальность и бюрократию.
  artifact: code-complete-ru.txt
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
