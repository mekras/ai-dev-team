  item_id: CCMP-text
  status: вывод источника
  text: Отладка должна искать причину дефекта, а не только устранять видимый симптом;
    исправление дефекта требует проверки и предотвращения повторения похожих ошибок.
  excerpt: Отладка должна искать причину дефекта, а не только устранять видимый симптом;
    исправление дефекта требует проверки и предотвращения повторения похожих ошибок.
