  item_id: CCMP-text
  status: наблюдение
  text: Качество класса зависит от ясной абстракции, качественного интерфейса, ответственного
    распределения обязанностей и разумных причин для выделения класса.
  excerpt: Качество класса зависит от ясной абстракции, качественного интерфейса,
