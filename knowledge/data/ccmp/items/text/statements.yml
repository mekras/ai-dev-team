- id: CCMP-003
  source_id: CCMP
  item_id: CCMP-text
  status: наблюдение
  text: Перед началом существенного конструирования нужно проверить готовность определения
    проблемы, требований, архитектуры и выбранных методик разработки.
  excerpt: Перед началом существенного конструирования нужно проверить готовность
    определения проблемы, требований, архитектуры и выбранных методик разработки.
  artifact: code-complete-ru.txt
  checked_at: '2026-06-25'
