- id: CCMP-008
  source_id: CCMP
  item_id: CCMP-text
  status: наблюдение
  text: Защитное программирование требует явно обрабатывать неправильные входные данные,
    ошибки, исключения и отладочные проверки, не превращая защиту в самостоятельный
    источник сложности.
  excerpt: Защитное программирование требует явно обрабатывать неправильные входные
    данные, ошибки, исключения и отладочные проверки, не превращая защиту в самостоятельный
    источник сложности.
