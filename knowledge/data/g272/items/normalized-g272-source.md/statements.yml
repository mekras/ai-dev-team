statements:
- id: G272-001
  source_id: G272
  item_id: G272-normalized-G272-source.md
  kind: fact
  status: ready_for_review
  text: надёжность — свойство объекта сохранять во времени способность выполнять требуемые
    функции; может включать безотказность, ремонтопригодность, восстанавливаемость,
    долговечность, сохраняемость, готовность или их сочетания.
  excerpt: раздел 3.1.
  artifact: source.md
  checked_at: '2026-06-26'
  scope:
    section_title: Надёжность
    application: аналитик, архитектор, технический писатель.
  open_questions: []
- id: G272-002
  source_id: G272
  item_id: G272-normalized-G272-source.md
  kind: fact
  status: ready_for_review
  text: безотказность (reliability) — непрерывное сохранение работоспособности; готовность
    (availability) — способность выполнять функцию в заданный момент, зависящая от
    безотказности, ремонтопригодности и восстанавливаемости.
  excerpt: разделы 3.1.6, 3.1.11.
  artifact: source.md
  checked_at: '2026-06-26'
  scope:
    section_title: Безотказность и готовность
    application: аналитик, архитектор.
  open_questions: []
- id: G272-003
  source_id: G272
  item_id: G272-normalized-G272-source.md
  kind: fact
  status: ready_for_review
  text: единичные показатели относятся к безотказности, ремонтопригодности, восстанавливаемости,
    долговечности, сохраняемости; готовность характеризуется коэффициентом готовности
    и не относится к единичным показателям.
  excerpt: раздел 3.6.
  artifact: source.md
  checked_at: '2026-06-26'
  scope:
    section_title: Показатели надёжности
    application: аналитик, архитектор.
  open_questions: []
- id: G272-004
  source_id: G272
  item_id: G272-normalized-G272-source.md
  kind: fact
  status: ready_for_review
  text: стандарт даёт русские термины с английскими соответствиями (reliability, availability,
    maintainability и др.), что позволяет согласовать терминологию с `DSCT` и `G250`.
  excerpt: параллельные термины разделов 3.1, 3.6.
  artifact: source.md
