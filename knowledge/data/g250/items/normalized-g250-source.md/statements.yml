- id: G250-002
  source_id: G250
  item_id: G250-normalized-G250-source.md
  status: ready_for_review
  text: надёжность включает завершённость (maturity), готовность (availability), отказоустойчивость
    (fault tolerance), восстанавливаемость (recoverability).
  excerpt: раздел характеристики «надёжность».
  artifact: source.md
  checked_at: '2026-06-26'
  scope:
