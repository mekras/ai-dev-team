  item_id: G250-normalized-G250-source.md
  status: ready_for_review
  text: общие требования к надёжности системы могут приводить к конкретным требованиям
    к завершённости, готовности, отказоустойчивости и восстанавливаемости программного
    продукта.
  excerpt: пример раздела о требованиях.
