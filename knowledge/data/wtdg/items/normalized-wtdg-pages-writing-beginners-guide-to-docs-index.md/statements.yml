    application: ''
  open_questions: []
- id: WTDG-013
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-beginners-guide-to-docs-index.md
  kind: fact
  status: verified
  text: при стартовом проектировании документации источник предлагает различать как минимум аудитории пользователей и разработчиков.
  excerpt: Users - want to use your code and don’t care how it works.
  artifact: index.md
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: WTDG-014
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-beginners-guide-to-docs-index.md
  kind: fact
  status: verified
  text: в минимальный стартовый набор документации источник включает описание решаемой проблемы, короткий пример использования, ссылки на код и трекер задач, способ получения поддержки, правила вклада и инструкции по установке.
  excerpt: Importantly, beware of overusing Frequently Asked Questions (FAQs) as documentation.
  artifact: index.md
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: WTDG-015
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-beginners-guide-to-docs-index.md
  kind: fact
  status: verified
  text: FAQ допустим как временная стартовая мера, но плохо подходит в роли основного долговременного формата документации.
  excerpt: 'Although FAQs can be useful starter documentation for new projects until you have time to write better documentation, FAQs quickly outgrow their use due to many drawbacks:'
  artifact: index.md
