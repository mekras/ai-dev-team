- id: WTDG-019
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-style-guides-index.md
  kind: fact
  status: verified
  text: стайлгайд может быть как коротким списком локальных проектных решений, так и более формальным сводом правил, при этом полезно опираться на уже существующие руководства.
  excerpt: A style guide can be something as simple as a list of decisions you’ve made about how to refer to different items you frequently write about.
  artifact: index.md
  checked_at: 2026-06-30
  scope:
    section_title: ''
    application: ''
