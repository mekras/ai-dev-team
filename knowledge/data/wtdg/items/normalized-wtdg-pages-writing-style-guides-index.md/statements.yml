- id: WTDG-021
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-style-guides-index.md
  kind: fact
  status: verified
  text: документация API рассматривается как отдельная область, для которой полезно проектировать API и документацию одновременно, а иногда и проектировать API через документацию.
  excerpt: It is best to work on developing the API and the documentation concurrently.
  artifact: index.md
  checked_at: 2026-06-30
