- id: WTDG-022
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-style-guides-index.md
  kind: fact
  status: verified
  text: источник описывает тесто-ориентированную документацию как способ сочетать ручное написание документации с автоматической проверкой её точности через тесты.
  excerpt: It allows you to write the bulk of the documentation by hand while also ensuring its accuracy by using your API’s tests to generate some content.
  artifact: index.md
