- id: WTDG-020
  source_id: WTDG
  item_id: WTDG-normalized-WTDG-pages-writing-style-guides-index.md
  kind: fact
  status: verified
  text: источник считает доступность и снижение предвзятости обязательными темами для стайлгайда и документационной практики.
  excerpt: It’s important to consider accessibility and biases in your style guide to ensure that all readers can understand the content you produce.
  artifact: index.md
  checked_at: 2026-06-30
