  text: UX writing рассматривается как проектирование текста интерфейса с упором на ясность, последовательность, точность, контекст и внимание к аудитории.
  excerpt: 'Many of the things that make UX writing good are the things that make other writing good too: clarity, consistency, precision, self-awareness, a whole lot of revision, and thoughtful attention to the context and the audience.'
