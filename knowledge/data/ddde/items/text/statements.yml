statements:
- id: DDDE-001
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: модель предметной области — это не схема и не диаграмма, а набор понятий,
    терминов и взаимосвязей в головах создателей проекта, отражающий их понимание
    предмета; схема лишь помогает выразить и передать модель.
  excerpt: глава 2, раздел «Документация, диаграммы, схемы»; глоссарий, определение
    `модель`.
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Что такое модель предметной области
    application: аналитик, архитектор — не путать модель с её визуальным представлением.
  open_questions: []
- id: DDDE-002
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'полезная модель не сводится к схеме хранения данных: она содержит правила
    поведения, ограничения и операции, обобщает разнородную информацию и служит цельной
    методикой решения задач предметной области.'
  excerpt: глава 1, разделы «Составляющие эффективного моделирования» и «Информоёмкая
    архитектура».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Информоёмкость модели
    application: 'аналитик, архитектор — критерий качества модели: правила и операции,
      а не только атрибуты.'
  open_questions: []
- id: DDDE-003
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: переработка знаний — совместная итеративная работа разработчиков и специалистов
    предметной области, в которой из разрозненной информации выплавляется строгая
    модель; она не выполняется в одиночку.
  excerpt: глава 1, раздел «Переработка знаний».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Переработка знаний (Knowledge Crunching) как совместный процесс
    application: менеджер проекта, аналитик — организовать доступ к специалистам и
      совместный, а не последовательный режим работы.
  open_questions: []
- id: DDDE-004
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: каскадная передача знаний (специалисты → аналитики → программисты) неудачна
    из-за отсутствия обратной связи; итеративный процесс без абстрагирования и интереса
    к предмету тоже не накапливает знаний.
  excerpt: глава 1, раздел «Переработка знаний».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Вред каскадной и «слепой» итеративной передачи знаний
    application: менеджер проекта, аналитик — выбор процесса с обратной связью.
  open_questions: []
- id: DDDE-005
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: в начале проекта знаний всегда недостаточно, они фрагментарны и могут утекать
    с уходом людей; сильные команды сознательно практикуют непрерывное изучение текущей
    предметной области, а не только технологий.
  excerpt: глава 1, раздел «Непрерывное обучение».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Роль специалистов и непрерывное обучение
    application: менеджер проекта, разработчик — инвестиции в обучение и удержание
      носителей знаний.
  open_questions: []
- id: DDDE-006
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: неявные правила предметной области, спрятанные в условных операторах кода,
    следует делать явными отдельными понятиями модели, чтобы знание стало доступным
    всем и замкнуло обратную связь со специалистами.
  excerpt: глава 1, раздел «Пример. Извлечение скрытого понятия».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Извлечение скрытых понятий в явную форму
    application: разработчик, аналитик — перевод неявных бизнес-правил в явные элементы
      модели.
  open_questions: []
- id: DDDE-007
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: полезные модели редко лежат на поверхности; в ходе работы второстепенные понятия
    отбрасываются, а изначально неважные выходят на первый план, и модель меняется
    глубоко. Совершенства не достигают, но она эволюционирует.
  excerpt: глава 1, раздел «Углублённые модели».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Итеративность и углубление модели
    application: аналитик, архитектор, менеджер — закладывать существенные пересмотры
      модели.
  open_questions: []
- id: DDDE-008
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: модель должна стать основой единого языка проекта; его словарь — имена классов,
    операций, явных правил модели и применяемых шаблонов, а отношения модели задают
    комбинаторные правила этого языка.
  excerpt: глава 2, раздел «Единый язык»; глоссарий.
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Единый язык (Ubiquitous Language) на основе модели
    application: вся команда — единый язык как обязательный инструмент.
  open_questions: []
- id: DDDE-009
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: один и тот же язык на основе модели применяют в речи, на диаграммах, в письменной
    документации, в коде и его тестах, а также при обсуждении задач и требований;
    чем шире охват, тем плодотворнее общение.
  excerpt: глава 2, раздел «Единый язык».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Единый язык пронизывает все средства коммуникации
    application: технический писатель, разработчик, аналитик — сквозное использование
      языка.
  open_questions: []
- id: DDDE-010
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'изменение в едином языке нужно воспринимать как изменение модели: при смене
    значения термина переименовывают классы, методы и модули, правят диаграммы и при
    необходимости меняют код; настойчивое употребление языка выявляет слабые места
    модели.'
  excerpt: глава 2, раздел «Единый язык».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Изменение языка есть изменение модели
    application: разработчик, аналитик — синхронизация языка, модели и кода.
  open_questions: []
- id: DDDE-011
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: без единого языка участники постоянно переводят между жаргонами; перевод затуманивает
    понятия модели, ведёт к разрушительному рефакторингу, скрытому расхождению смысла
    терминов и ослабляет переработку знаний.
  excerpt: глава 2, раздел «Единый язык».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Вред перевода между языками
    application: менеджер проекта, аналитик — отказ от «двух языков» и от роли посредников-переводчиков.
  open_questions: []
- id: DDDE-012
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: отгораживать специалистов от смыслового ядра модели недопустимо; если квалифицированные
    специалисты не понимают модель, значит с моделью что-то не так. Технический жаргон
    допустим лишь как дополнение, не образующее альтернативный словарь для той же
    области.
  excerpt: глава 2, раздел «Одна команда — один язык».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Одна команда — один язык
    application: менеджер проекта, аналитик — политика единого языка.
  open_questions: []
- id: DDDE-013
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'один из лучших способов улучшить модель — проговаривать вслух варианты конструкций
    модели в сценариях: ухо сразу улавливает косноязычие, а краткие точные формулировки
    указывают на удачную модель.'
  excerpt: глава 2, раздел «Моделирование вслух».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Моделирование вслух
    application: аналитик, разработчик — проверка модели устными сценариями.
  open_questions: []
- id: DDDE-014
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: диалог, опирающийся на явные объекты модели, осмысленнее и короче для специалиста,
    чем диалог в терминах таблиц и процедур; терминология на основе модели делает
    обсуждение того, что должна делать программа, чётким.
  excerpt: глава 2, раздел «Пример. Разработка программы маршрутизации грузов», сценарии
    1 и 2.
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Язык модели улучшает обсуждение требований
    application: аналитик — ценность языка модели при выявлении требований.
  open_questions: []
- id: DDDE-015
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: диаграммы UML показывают отношения и взаимодействия объектов, но не передают
    смысл понятий и назначение объектов; их задача — минималистичная опора для общения,
    а не отображение всей модели.
  excerpt: глава 2, раздел «Документация, диаграммы, схемы».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Диаграммы поддерживают язык, но не заменяют модель
    application: технический писатель, архитектор — правила использования диаграмм.
  open_questions: []
- id: DDDE-016
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: документация должна дополнять код и устные обсуждения, отражать смысл, крупномасштабные
    структуры и ключевые элементы, но не повторять детали, точно заданные кодом; её
    объём держат минимальным.
  excerpt: глава 2, раздел «Письменная проектная документация».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Письменная документация дополняет код
    application: технический писатель — назначение и объём проектных документов.
  open_questions: []
- id: DDDE-017
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'проверка ценности документа — его связь с единым языком: если его термины
    не появляются в речи и коде или документ отстаёт от эволюции языка, он не выполняет
    задачи; принуждать обновлять «мёртвый» документ бесполезно.'
  excerpt: глава 2, раздел «Документация должна активно работать».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Документ должен жить в едином языке
    application: технический писатель, менеджер — отбор и сопровождение активных документов.
  open_questions: []
- id: DDDE-018
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'выполняемый код однозначен в поведении и ближе всего к реальности, но не
    самодостаточен как документация: имена могут быть двусмысленными или устаревшими,
    а читатель тонет в деталях; нужны стиль, обсуждения и пояснения.'
  excerpt: глава 2, разделы «Выполняемый код решает всё» и «Документация должна дополнять
    код».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Пределы кода как документации
    application: разработчик, технический писатель — реалистичный взгляд на «код как
      документацию».
  open_questions: []
- id: DDDE-019
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: помимо одной рабочей модели, для обучения можно использовать пояснительные
    модели — иные точки зрения на предметную область; им лучше не быть объектными,
    а их отличие от рабочей модели должно быть всем явно понятно.
  excerpt: глава 2, раздел «Пояснительные модели».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Пояснительные модели
    application: технический писатель, аналитик — безопасное использование вспомогательных
      моделей.
  open_questions: []
- id: DDDE-020
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'проектирование по модели требует одной модели, служащей и анализу, и архитектуре:
    часть системы строят так, чтобы буквально отражать модель, а модель меняют ради
    естественной реализации; код есть выражение модели.'
  excerpt: глава 3, раздел «Проектирование по модели»; глоссарий.
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Проектирование по модели (Model-Driven Design)
    application: архитектор, разработчик — определяющий принцип DDD.
  open_questions: []
- id: DDDE-021
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'связь рвётся, в частности, при отдельной аналитической модели, создаваемой
    без учёта реализации: после начала кодирования её наработки теряются. Если архитектура
    не соответствует структуре модели, модель бесполезна, а правильность программы
    под подозрением.'
  excerpt: глава 3, вступление и раздел «Проектирование по модели».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Что разрывает связь модели и кода
    application: архитектор, менеджер — риски разрыва анализа и проектирования.
  open_questions: []
- id: DDDE-022
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'резкое разделение моделирования и программирования вредно: если пишущие код
    не отвечают за модель, рефакторинг ухудшает её; если моделист отделён от реализации,
    он теряет интуицию. Любой, кто меняет код, должен уметь выражать в нём модель
    и участвовать в обсуждениях со специалистами.'
  excerpt: глава 3, раздел «Моделировщики-практики».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: '«Руки в глине»: разработчики-моделисты'
    application: менеджер проекта, архитектор, разработчик — организация ролей и ответственности.
  open_questions: []
- id: DDDE-023
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: для буквального соответствия кода и модели нужна парадигма моделирования,
    поддерживаемая инструментами (например, ООП; для логики — Prolog); чисто процедурные
    языки не дают подходящей парадигмы для большинства предметных областей.
  excerpt: глава 3, раздел «Парадигмы моделирования и средства программирования».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Парадигма моделирования и средства реализации
    application: архитектор, разработчик — выбор технологий под проектирование по
      модели.
  open_questions: []
- id: DDDE-024
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: несоответствие между моделью, показываемой пользователю, и моделью реализации
    вызывает путаницу и ошибки; при проектировании по модели одну согласованную модель
    можно безопасно показывать пользователю шире.
  excerpt: 'глава 3, раздел «Анатомия модели: зачем модель нужна пользователю».'
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Модель на стыке с пользователем
    application: аналитик, архитектор — единство модели на стыке с интерфейсом.
  open_questions: []
- id: DDDE-025
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: 'реализация модели в коде сама становится способом проверки и углубления знаний:
    попытка выразить понятие в работающей программе обнажает пробелы и противоречия,
    которые возвращаются специалистам как новые вопросы.'
  excerpt: глава 1, раздел «Пример. Извлечение скрытого понятия»; глава 3, «Проектирование
    по модели».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Замыкание обратной связи через реализацию
    application: разработчик, аналитик — реализация как часть переработки знаний.
  open_questions: []
- id: DDDE-026
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: многоуровневая архитектура изолирует задачи по уровням (интерфейс, приложение,
    предметная область, инфраструктура); элемент уровня зависит только от того же
    или более низкого уровня, а связь снизу вверх делается косвенно.
  excerpt: глава 4, разделы «Многоуровневая архитектура», «Связь между уровнями»;
    глоссарий.
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
  scope:
    section_title: Назначение многоуровневой архитектуры (Layered Architecture)
    application: архитектор — структура слоёв и направление зависимостей.
  open_questions: []
- id: DDDE-027
  source_id: DDDE
  item_id: DDDE-text
  status: ready_for_review
  text: проектирование по модели возможно только при чётко отделённом уровне предметной
    области; весь код модели сосредотачивают в одном уровне и изолируют от интерфейса,
    операций и инфраструктуры, иначе модель не разовьётся.
  excerpt: глава 4, раздел «Уровень предметной области — вместилище модели».
  artifact: ddd-evans-ru.txt
  checked_at: '2026-06-23'
