statements:
- id: APIB-001
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: книга определяет API по смыслу как формальное обязательство связывать между
    собой различные программируемые контексты, а не просто как «программный интерфейс
    приложений».
  excerpt: глава 2 «Определение API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: API как обязательство
    application: архитектор.
  open_questions: []
- id: APIB-002
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: потребителями API являются разработчики, поэтому поставщик не контролирует
    качество чужих инженерных решений, но проблемы будут приписывать ему.
  excerpt: глава 2 «Определение API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Пользователи API — инженеры
    application: менеджер проекта.
  open_questions: []
- id: APIB-003
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: API одновременно мультиплицирует и возможности, и ошибки разработчика, что
    налагает повышенную ответственность.
  excerpt: глава 2 «Определение API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: API — мультипликатор ошибок
    application: архитектор.
  open_questions: []
- id: APIB-004
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: базовые критерии хорошего API — очевидность (как решить задачу), читаемость
    (правильный код по номенклатуре) и консистентность (действие по аналогии).
  excerpt: глава 3 «Критерии качества API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Три критерия качества
    application: разработчик.
  open_questions: []
- id: APIB-005
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: нелогичность и неконсистентность возникают не в начальном ядре API, а при
    его развитии и попытках сохранить совместимость.
  excerpt: глава 3 «Критерии качества API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Главные проблемы — при развитии
    application: архитектор.
  open_questions: []
- id: APIB-006
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: проектирование «на будущее» означает избыточность интерфейсов и абстрагирования
    и оправдано, только если у API это будущее есть, иначе это оверинжиниринг.
  excerpt: глава 3 «Критерии качества API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Закладывание на будущее небесплатно
    application: архитектор.
  open_questions: []
- id: APIB-007
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: обратная совместимость — временно́е свойство качества, которое отличает разработку
    API от разработки ПО вообще.
  excerpt: глава 4 «Обратная совместимость».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Совместимость как временна́я характеристика
    application: архитектор.
  open_questions: []
- id: APIB-008
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: выпуск обратно несовместимых версий — «налог» на потребителей; не следует
    ломать совместимость, если это возможно.
  excerpt: глава 4 «Обратная совместимость».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Слом совместимости — скрытый налог
    application: менеджер проекта.
  open_questions: []
- id: APIB-009
  source_id: APIB
  item_id: APIB-text
  kind: observation
  status: ready_for_review
  text: книга принимает версионирование semver и устанавливает эквивалентность «мажорная
    версия» = «обратно несовместимое изменение функциональности».
  excerpt: глава 5 «О версионировании».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Принятие semver
    application: разработчик.
  open_questions: []
- id: APIB-010
  source_id: APIB
  item_id: APIB-text
  kind: observation
  status: ready_for_review
  text: книга намеренно избегает слов «метод», «объект», «функция» в пользу нейтрального
    термина «сущность» как атомарной единицы функциональности.
  excerpt: глава 6 «Условные обозначения и терминология».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Нейтральный термин «сущность»
    application: технический писатель.
  open_questions: []
- id: APIB-011
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: 'проектирование ведётся сверху вниз из четырёх шагов: определение области
    применения, разделение уровней абстракции, разграничение областей ответственности,
    описание конечных интерфейсов.'
  excerpt: глава 7 «Пирамида контекстов API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Алгоритм проектирования из четырёх шагов
    application: архитектор.
  open_questions: []
- id: APIB-012
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: 'цена ошибки различна по уровням: плохое именование исправить просто, а неверное
    понимание назначения API — практически невозможно.'
  excerpt: глава 7 «Пирамида контекстов API».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Цена ошибки растёт к вершине
    application: архитектор.
  open_questions: []
- id: APIB-013
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: книга предлагает четыре раза задать вопрос «какую проблему мы решаем?» с ударением
    на каждом слове, чтобы проверить нужность, компетентность и адекватность решения.
  excerpt: глава 8 «Определение области применения».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Четырёхкратный вопрос о проблеме
    application: аналитик.
  open_questions: []
- id: APIB-014
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: выделение уровней абстракции преследует три цели — упрощение работы разработчика,
    поддержку обратной совместимости и интероперабельность.
  excerpt: глава 9 «Разделение уровней абстракции».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Цели уровней абстракции
    application: архитектор.
  open_questions: []
- id: APIB-015
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: одно и то же поле, означающее разное в разных интерфейсах, — признак смешения
    уровней абстракции.
  excerpt: глава 9 «Разделение уровней абстракции».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Смешение уровней через общее поле
    application: разработчик.
  open_questions: []
- id: APIB-016
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: соблюдение изоляции уровней усложняет интерфейс, но никакая гибкость и расширяемость
    не бывают бесплатными.
  excerpt: глава 9 «Разделение уровней абстракции».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Изоляция уровней небесплатна
    application: архитектор.
  open_questions: []
- id: APIB-017
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: дерево потоков данных — способ проверить разделение уровней и развивать большие
    API, которые невозможно удержать в памяти целиком.
  excerpt: глава 9 «Разделение уровней абстракции», раздел о потоках данных.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Дерево потоков данных
    application: архитектор.
  open_questions: []
- id: APIB-018
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: каждый уровень иерархии — самостоятельная промежуточная предметная область,
    через которую задача переводится из одного контекста в другой.
  excerpt: глава 10 «Разграничение областей ответственности».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Каждый уровень — своя предметная область
    application: аналитик.
  open_questions: []
- id: APIB-019
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: модифицирующие операции (например, отмена заказа) на каждом уровне абстракции
    переформулируются и не должны «перепрыгивать» уровни.
  excerpt: глава 10 «Разграничение областей ответственности».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Переформулирование операций по уровням
    application: разработчик.
  open_questions: []
- id: APIB-020
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: на этапе спроектированной номенклатуры следует встать на место разработчика
    и попробовать написать код, чтобы обнаружить неудобства API.
  excerpt: глава 10 «Разграничение областей ответственности», раздел о сценариях использования.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Проверка через сценарии использования
    application: аналитик.
  open_questions: []
- id: APIB-021
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: «нулевое правило» гласит, что правила — обобщение опыта и не должны применяться
    бездумно, если нет причины им следовать.
  excerpt: глава 11 «Описание конечных интерфейсов», правило 0.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Правила применять осмысленно
    application: разработчик.
  open_questions: []
- id: APIB-022
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: из названия сущности должно быть очевидно, что она делает и к каким побочным
    эффектам приводит; модифицирующих операций за GET быть не может.
  excerpt: глава 11 «Описание конечных интерфейсов», правило явности.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Явное лучше неявного
    application: разработчик.
  open_questions: []
- id: APIB-023
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: если сигнатуру можно понять неправильно, то по мере роста популярности API
    её неизбежно будет понимать неправильно всё больше партнёров.
  excerpt: глава 11 «Описание конечных интерфейсов», раздел о читабельности.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Закон больших чисел против вас
    application: разработчик.
  open_questions: []
- id: APIB-024
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: сущности следует именовать конкретно, не экономить буквы и делать тип поля
    ясным из названия для лучшей читаемости.
  excerpt: глава 11 «Описание конечных интерфейсов», правила именования.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Не экономить на именах
    application: разработчик.
  open_questions: []
- id: APIB-025
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: ошибки должны быть информативными; из интерфейса должны быть понятны не только
    решение задачи, но и возможные ошибки и исключения.
  excerpt: глава 11 «Описание конечных интерфейсов», правило об ошибках.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Информативные ошибки
    application: разработчик.
  open_questions: []
- id: APIB-026
  source_id: APIB
  item_id: APIB-text
  kind: observation
  status: ready_for_review
  text: книга формулирует правило об идемпотентности операций и предостерегает от
    неатомарных операций.
  excerpt: глава 11 «Описание конечных интерфейсов», правила об идемпотентности и
    атомарности.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Идемпотентность операций
    application: разработчик.
  open_questions: []
- id: APIB-027
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: не следует изобретать собственную безопасность; технические ограничения API
    нужно явно декларировать.
  excerpt: глава 11 «Описание конечных интерфейсов», правила о безопасности.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Не изобретать безопасность
    application: специалист по безопасности.
  open_questions: []
- id: APIB-028
  source_id: APIB
  item_id: APIB-text
  kind: observation
  status: ready_for_review
  text: локализация и интернационализация продуктовых данных вынесены в отдельное
    правило проектирования интерфейсов.
  excerpt: глава 11 «Описание конечных интерфейсов», правило о локализации.
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Локализация продуктовых данных
    application: технический писатель.
  open_questions: []
- id: APIB-029
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: обратная совместимость — свойство системы оставаться функционально корректной
    во времени, то есть код потребителей продолжает решать свою задачу.
  excerpt: глава 13 «Постановка проблемы обратной совместимости».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Совместимость = функциональная стабильность
    application: архитектор.
  open_questions: []
- id: APIB-030
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: срок поддержки совместимости следует увязывать с жизненными циклами приложений
    и LTS-периодами платформ (обычно несколько лет).
  excerpt: глава 13 «Постановка проблемы обратной совместимости».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Длительность увязана с жизненным циклом платформ
    application: менеджер проекта.
  open_questions: []
- id: APIB-031
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: 'совместимость подрывают три процесса: фрагментация клиентов, размывание предметной
    области и нижележащей платформы.'
  excerpt: глава 13 «Постановка проблемы обратной совместимости».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Три процесса размывания
    application: архитектор.
  open_questions: []
- id: APIB-032
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: в хорошем API документированная и недокументированная части соотносятся примерно
    как 1 к 10, и наружу нужно выставлять минимум функциональности.
  excerpt: глава 14 «О ватерлинии айсберга».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Правило айсберга 1:10
    application: архитектор.
  open_questions: []
- id: APIB-033
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: каждое публичное поле, метод и сущность — продуктовое решение, которое должно
    иметь веские причины для документирования.
  excerpt: глава 14 «О ватерлинии айсберга».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Каждая публичная сущность — продуктовое решение
    application: менеджер проекта.
  open_questions: []
- id: APIB-034
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: 'не следует легитимизировать серые зоны (недокументированные поля, использование
    непубличных особенностей в примерах): либо функциональность гарантируется всегда,
    либо на её существование не намекают.'
  excerpt: глава 14 «О ватерлинии айсберга».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Нельзя принять обязательства наполовину
    application: технический писатель.
  open_questions: []
- id: APIB-035
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: неявные договорённости (например, о модели консистентности) нужно явно фиксировать
    в документации.
  excerpt: глава 14 «О ватерлинии айсберга».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Фиксировать неявные договорённости
    application: разработчик.
  open_questions: []
- id: APIB-036
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
  text: функциональность следует расширять так, чтобы существующие методы становились
    частным упрощённым случаем более общего интерфейса.
  excerpt: глава 15 «Расширение через абстрагирование»; глава 18 «Интерфейсы как универсальный
    паттерн».
  artifact: the-api-book-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Расширение через абстрагирование
    application: архитектор.
  open_questions: []
- id: APIB-037
  source_id: APIB
  item_id: APIB-text
  kind: fact
  status: ready_for_review
