statements:
- id: TMDS-001
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'моделирование угроз строится вокруг четырёх вопросов: (1) что вы строите,
    (2) что может пойти не так с этим после постройки, (3) что с этим делать, (4)
    достаточно ли хорошо вы выполнили анализ.'
  excerpt: введение, раздел «The Four-Step Framework».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Рамка из четырёх вопросов
    application: специалист по безопасности, архитектор, аналитик.
  open_questions: []
- id: TMDS-002
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'четырём вопросам соответствуют четыре шага: смоделировать систему → найти
    угрозы → устранить угрозы → проверить работу на полноту и результативность; рамка
    согласована с жизненным циклом разработки и эксплуатации.'
  excerpt: введение, раздел «The Four-Step Framework», рис. I-1.
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Четырёхэтапная рамка и её этапы
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-003
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'методики внутри каждого этапа сравниваются с блоками конструктора: их можно
    подключать и заменять, не меняя всю рамку (например, заменить STRIDE деревьями
    атак), но не все методики совместимы между собой.'
  excerpt: введение, раздел «The Four-Step Framework».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Методики как взаимозаменяемые «блоки»
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-004
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'глава 1 проводит читателя по рамке на примере: построить диаграмму системы,
    использовать STRIDE для поиска того, что может пойти не так, устранить каждую
    угрозу и проверить работу чек-листом.'
  excerpt: глава 1 «Dive In and Threat Model!».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Учебный проход по рамке
    application: специалист по безопасности, разработчик.
  open_questions: []
- id: TMDS-005
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: при путанице в процессе следует возвращаться к четырём базовым вопросам как
    к опоре.
  excerpt: глава 1, раздел «Learning to Threat Model».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Возврат к четырём вопросам при затруднении
    application: специалист по безопасности, аналитик.
  open_questions: []
- id: TMDS-006
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: к структурированному моделированию угроз можно подходить через фокус на активах,
    на атакующих или на ПО; книга рекомендует начинать с модели ПО как более продуктивной
    отправной точки, чем активы или атакующие.
  excerpt: глава 2, разделы «Structured Approaches…», «Models of Software».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Три стратегии фокуса
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-007
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: для ответа на вопрос «что вы строите» используются диаграммы (прежде всего
    диаграммы потоков данных, DFD), отражающие процессы, хранилища, потоки данных
    и внешние сущности.
  excerpt: глава 2, разделы «Models of Software», «Types of Diagrams».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Диаграммы потоков данных как модель системы
    application: архитектор, специалист по безопасности.
  open_questions: []
- id: TMDS-008
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: границы доверия (trust boundaries) на диаграмме отмечают места, где меняется
    уровень доверия или контроля; они особенно важны для поиска угроз.
  excerpt: глава 2, раздел «Trust Boundaries».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Границы доверия
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-009
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: на диаграмме важно отмечать точки входа и проверять её адекватность (соответствие
    реальной системе) перед поиском угроз.
  excerpt: глава 2, разделы «Entry Points», «Validating Diagrams».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Точки входа и валидация диаграммы
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-010
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'STRIDE — мнемоника для типов того, что идёт не так в безопасности: Spoofing
    (подмена), Tampering (фальсификация), Repudiation (отказ от авторства), Information
    Disclosure (раскрытие информации), Denial of Service (отказ в обслуживании), Elevation
    of Privilege (повышение привилегий).'
  excerpt: глава 1, раздел «Using the STRIDE Mnemonic»; глава 3.
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: STRIDE как мнемоника угроз
    application: специалист по безопасности, архитектор, разработчик.
  open_questions: []
- id: TMDS-011
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: STRIDE как фреймворк и мнемоника изобретён Loren Kohnfelder и Praerit Garg
    (1999) для помощи разработчикам в выявлении типов атак на ПО.
  excerpt: глава 3, вводный раздел.
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Происхождение STRIDE
    application: специалист по безопасности.
  open_questions: []
- id: TMDS-012
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'использование STRIDE — это техника элиситации: команда, знающая фреймворк,
    проходит по модели и находит угрозы; «поиск угроз» в книге — надмножество терминов
    enumeration, analysis, elicitation, discovery.'
  excerpt: глава 3, вводный раздел.
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: STRIDE как техника элиситации угроз
    application: специалист по безопасности.
  open_questions: []
- id: TMDS-013
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: существуют варианты применения — STRIDE-per-Element (по элементам диаграммы),
    STRIDE-per-Interaction (по взаимодействиям) и DESIST как альтернативная мнемоника.
  excerpt: глава 3, раздел «STRIDE Variants».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Варианты STRIDE
    application: специалист по безопасности.
  open_questions: []
- id: TMDS-014
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: для этапа поиска угроз задаются критерии выхода (exit criteria), показывающие,
    когда поиск можно считать достаточным.
  excerpt: глава 3, раздел «Exit Criteria».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Критерии выхода и чек-листы
    application: специалист по безопасности.
  open_questions: []
- id: TMDS-015
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: дерево атак — модель «что может пойти не так», где корень — цель атакующего,
    а ветви — способы её достижения; деревья атак можно использовать как альтернативу
    STRIDE на этапе поиска угроз, оставляя остальную рамку прежней.
  excerpt: глава 4 «Attack Trees».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Деревья атак
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-016
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: библиотеки атак систематизируют известные угрозы; книга рассматривает CAPEC
    и OWASP Top Ten и отличает библиотеки от чек-листов и литературных обзоров.
  excerpt: глава 5 «Attack Libraries».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Библиотеки атак
    application: специалист по безопасности.
  open_questions: []
- id: TMDS-017
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: для угроз приватности применяются отдельные инструменты — таксономия приватности
    Солова, оценки влияния на приватность (PIA), Nymity Slider, контекстная целостность
    и методика LINDDUN.
  excerpt: глава 6 «Privacy Tools».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Инструменты приватности
    application: специалист по безопасности, аналитик, юрист.
  open_questions: []
- id: TMDS-018
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: моделирование угроз даёт наибольшую отдачу, когда начато рано (при проектировании
    и изменениях), и должно завершаться определёнными артефактами; важно зафиксировать,
    с чего начать и чем закончить.
  excerpt: глава 7, раздел «Starting the Threat Modeling Project».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Когда моделировать угрозы
    application: специалист по безопасности, архитектор, project-manager.
  open_questions: []
- id: TMDS-019
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: найденные угрозы следует отслеживать таблицами и списками, фиксируя допущения
    и внешние заметки по безопасности (external security notes).
  excerpt: глава 7, раздел «Tracking with Tables and Lists».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Отслеживание угроз таблицами и списками
    application: специалист по безопасности, аналитик.
  open_questions: []
- id: TMDS-020
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: книга выделяет специфику моделирования угроз для API и для границ доверия
    «заказчик/поставщик» и новых технологий как отдельные сценарии.
  excerpt: глава 7, раздел «Scenario-Specific Elements…», подраздел «Threat Modeling
    an API».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Моделирование угроз для API
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-021
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'каждому типу угроз STRIDE соответствует защитное свойство и тактика: аутентификация
    против спуфинга, целостность против фальсификации, неотказуемость против отказа
    от авторства, конфиденциальность против раскрытия, доступность против отказа в
    обслуживании, авторизация против повышения привилегий.'
  excerpt: глава 8, раздел «Tactics and Technologies for Mitigating Threats».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Привязка свойств безопасности к STRIDE
    application: специалист по безопасности, архитектор, разработчик.
  open_questions: []
- id: TMDS-022
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: угрозы приватности нейтрализуются минимизацией данных, криптографией и мерами
    соответствия и политики (compliance and policy).
  excerpt: глава 8, раздел «Mitigating Privacy Threats».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Нейтрализация угроз приватности
    application: специалист по безопасности, юрист.
  open_questions: []
- id: TMDS-023
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'при устранении угроз применяются классические стратегии управления риском:
    избежать риск, устранить/снизить (address), принять, передать (transfer) и игнорировать
    риск.'
  excerpt: глава 9, раздел «Classic Strategies for Risk Management».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Пять классических стратегий работы с риском
    application: специалист по безопасности, архитектор, project-manager.
  open_questions: []
- id: TMDS-024
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: меры можно реализовать изменением дизайна, применением стандартных технологий
    нейтрализации или проектированием собственной меры; фаззинг сам по себе не является
    мерой нейтрализации.
  excerpt: глава 9, раздел «Selecting Mitigations for Risk Management».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Способы устранения угроз
    application: специалист по безопасности, разработчик.
  open_questions: []
- id: TMDS-025
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: для приоритизации угроз используются простые подходы, ранжирование по «планке
    дефектов» (bug bar) и оценка стоимости; риск можно закрыть и через бизнес- или
    пользовательское принятие (acceptance).
  excerpt: глава 9, разделы «Threat-Specific Prioritization…», «Mitigation via Risk
    Acceptance».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Приоритизация и bug bar
    application: специалист по безопасности, project-manager.
  open_questions: []
- id: TMDS-026
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: 'четвёртый этап — проверка: тестирование мер (включая пентест), проверка приобретённого
    кода, контроль соответствия модели реальности и полноты процесса; моделирование
    угроз и тестирование усиливают друг друга.'
  excerpt: глава 10 «Validating That Threats Are Addressed».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Проверка устранения угроз
    application: специалист по безопасности, роль проверки результата.
  open_questions: []
- id: TMDS-027
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: допущения следует документировать по мере работы, так как они влияют на корректность
    модели и проверку.
  excerpt: глава 10, раздел «Document Assumptions as You Go».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Документирование допущений по ходу работы
    application: специалист по безопасности, аналитик.
  open_questions: []
- id: TMDS-028
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: для моделирования угроз применяются как общие инструменты (доски, офисные
    пакеты, баг-трекеры), так и специализированные открытые и коммерческие инструменты,
    включая игру Elevation of Privilege и Microsoft SDL Threat Modeling Tool.
  excerpt: глава 11 «Threat Modeling Tools».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Инструменты моделирования угроз
    application: специалист по безопасности.
  open_questions: []
- id: TMDS-029
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: требования, угрозы и меры взаимосвязаны и уточняют друг друга; «поваренная
    книга требований» помогает выводить требования безопасности.
  excerpt: глава 12, раздел «The Interplay of Requirements, Threats, and Mitigations».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Взаимосвязь требований, угроз и мер
    application: аналитик, специалист по безопасности.
  open_questions: []
- id: TMDS-030
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: требования безопасности удобно структурировать рамкой «предотвращение/обнаружение/реагирование»
    (Prevent/Detect/Respond) и рамкой «люди/процессы/технологии» (People/Process/Technology).
  excerpt: глава 12, соответствующие разделы.
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Рамки Prevent/Detect/Respond и People/Process/Technology
    application: аналитик, специалист по безопасности, project-manager.
  open_questions: []
- id: TMDS-031
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: источником требований служат стандарты соответствия — Cloud Security Alliance,
    NIST Publication 200, PCI-DSS — а также требования приватности (Fair Information
    Practices, Privacy by Design).
  excerpt: глава 12, разделы «Compliance-Driven Requirements», «Privacy Requirements».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Требования соответствия
    application: аналитик, специалист по безопасности, юрист.
  open_questions: []
- id: TMDS-032
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: каждому типу STRIDE соответствует категория требований (аутентификация, целостность,
    неотказуемость, конфиденциальность, доступность, авторизация); книга также выделяет
    «не-требования».
  excerpt: глава 12, разделы «The STRIDE Requirements», «Non-Requirements».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: STRIDE как источник требований
    application: аналитик, специалист по безопасности.
  open_questions: []
- id: TMDS-033
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: книга систематизирует угрозы веба (сайты, браузеры и плагины), угрозы арендатора
    облака (инсайдерские, со-арендаторы, соответствие, правовые, криминалистические)
    и угрозы провайдера, а также мобильные угрозы.
  excerpt: глава 13 «Web and Cloud Threats».
  artifact: threat-modeling.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Угрозы веба и облака
    application: специалист по безопасности, архитектор.
  open_questions: []
- id: TMDS-034
  source_id: TMDS
  item_id: TMDS-text
  status: ready_for_review
  text: моделирование угроз учитывает жизненный цикл учётной записи (создание, сопровождение,
    прекращение), аутентификацию по факторам «что знаете/имеете/чем являетесь», восстановление
    доступа и угрозы кражи личности.
