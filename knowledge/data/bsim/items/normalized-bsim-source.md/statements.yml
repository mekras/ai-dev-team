  item_id: BSIM-normalized-BSIM-source.md
  status: ready_for_review
  text: BSIMM организован по четырём доменам — Governance, Intelligence, SSDL Touchpoints,
    Deployment — с двенадцатью практиками; каждая практика содержит наблюдаемые активности
    по уровням.
