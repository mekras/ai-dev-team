- id: BSIM-003
  source_id: BSIM
  item_id: BSIM-normalized-BSIM-source.md
  status: ready_for_review
  text: 'BSIMM описывает, что организации делают (наблюдение), тогда как SAMM` предписывает
    целевые уровни; их уместно использовать вместе: SAMM — для целей, BSIMM — для
    сравнения с практикой отрасли.'
  excerpt: сопоставление моделей.
