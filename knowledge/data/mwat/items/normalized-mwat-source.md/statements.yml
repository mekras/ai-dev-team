  kind: fact
  status: ready_for_review
  text: CWE — каталог типов слабостей ПО и аппаратуры с идентификаторами CWE-<номер>`,
    организованный иерархически; MITRE публикует список наиболее опасных слабостей
    `CWE Top 25`.
  excerpt: обзор CWE.
  artifact: source.md
