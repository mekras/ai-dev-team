- id: MWAT-004
  source_id: MWAT
  item_id: MWAT-normalized-MWAT-source.md
  kind: fact
  status: ready_for_review
  text: CAPEC связан с CWE (какие слабости эксплуатирует шаблон) и сопоставим с тактиками
    и техниками `ATT&CK`, что соединяет слабости, шаблоны атак и наблюдаемые TTP.
  excerpt: связи CAPEC.
  artifact: source.md
