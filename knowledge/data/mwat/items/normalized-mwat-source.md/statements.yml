- id: MWAT-002
  source_id: MWAT
  item_id: MWAT-normalized-MWAT-source.md
  kind: fact
  status: ready_for_review
  text: CWE — общий словарь слабостей, на который ссылаются `ASVS`, OWASP Top 10`
    и средства анализа; он связывает требования и находки с типами слабостей.
  excerpt: связи CWE.
  artifact: source.md
  checked_at: '2026-06-25'
  scope:
    section_title: CWE как общий словарь
    application: специалист по безопасности.
  open_questions: []
- id: MWAT-003
  source_id: MWAT
  item_id: MWAT-normalized-MWAT-source.md
  kind: fact
  status: ready_for_review
  text: CAPEC — каталог шаблонов атак с идентификаторами `CAPEC-<номер>`, классифицированных
    по механизмам и доменам атаки.
  excerpt: обзор CAPEC.
  artifact: source.md
  checked_at: '2026-06-25'
  scope:
    section_title: CAPEC — каталог шаблонов атак
    application: специалист по безопасности.
