statements:
- id: INMA-006
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: персонажи полезны как конкретные воображаемые пользователи, которые помогают
    команде не проектировать для размытых обобщений и личных предпочтений разработчиков.
  excerpt: глава о персонажах.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: роль UX, выявление требований, анализ пользовательских сегментов.
  open_questions: []
- id: INMA-007
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: персонажи должны быть достаточно конкретными и устойчивыми, чтобы сохранять
    фокус проектирования под давлением разработки.
  excerpt: раздел о конкретности персонажа.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: правила подготовки UX-материалов и пользовательских моделей.
  open_questions: []
- id: INMA-008
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: 'цели пользователя отличаются от задач: задачи меняются вместе с технологией,
    а цели остаются более устойчивыми и лучше подходят как основание проектирования.'
  excerpt: глава о проектировании ради результата.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: requirements-analysis, роль UX, проектирование сценариев.
  open_questions: []
- id: INMA-009
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: качественное проектирование взаимодействия помогает пользователю достигать
    практических целей, не мешая личным целям, включая сохранение достоинства и ощущение
    контроля.
  excerpt: глава о целях пользователя.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: критерии готовности результата роли UX и проверка пользовательских
      сценариев.
  open_questions: []
- id: INMA-010
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: сценарий описывает, как персонаж применяет продукт для достижения цели; сценарии
    помогают проверять проектные предположения и смотреть на продукт с позиции персонажа.
  excerpt: глава о сценариях.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: requirements-specification, UX-проектирование, requirements-validation.
  open_questions: []
- id: INMA-011
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: сценарии полезнее описывать с достаточным охватом от начала до конца, а не
    как исчерпывающую детализацию каждого шага.
  excerpt: раздел о сценариях.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: запись вариантов использования и пользовательских сценариев.
  open_questions: []
- id: INMA-012
  source_id: INMA
  item_id: INMA-fragment-personas
  status: ready_for_review
  text: проектировочные усилия нужно концентрировать на повседневных и обязательных
    сценариях; исключительные ситуации не должны доминировать над опытом основного
    использования.
  excerpt: разделы о повседневных, обязательных и исключительных сценариях.
  artifact: personas-goals-scenarios.md
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: приоритизация UX-работы, проверка интерфейса и пользовательских сценариев.
  open_questions: []
