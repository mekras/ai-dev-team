  kind: fact
  status: ready_for_review
  text: проектирование взаимодействия продукта с пользователем должно предшествовать
    программированию, потому что поздняя проверка удобства не заменяет раннее проектное
    решение о поведении продукта.
  excerpt: введение и предисловие ко второму изданию.
