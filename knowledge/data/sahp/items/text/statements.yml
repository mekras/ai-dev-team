statements:
- id: SAHP-001
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: в архитектуре программного обеспечения существуют целые классы задач без универсальных
    и надёжных решений; для архитектора почти каждая задача уникальна, и серебряных
    пуль — универсальных решений — не существует.
  excerpt: глава 1, вводный раздел.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: В архитектуре нет «передового опыта»
    application: архитектор, менеджер проекта — не искать готовый «лучший» шаблон,
      а анализировать конкретную ситуацию.
  open_questions: []
- id: SAHP-002
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: работа архитектора — объективно определить, оценить и выбрать компромиссы;
    «лучшего» решения, как правило, нет, есть наименее худший набор компромиссов,
    при котором баланс конкурирующих характеристик способствует успеху проекта.
  excerpt: глава 1, вводный раздел.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Цель — «наименее худшее» сочетание компромиссов
    application: архитектор — формулировка критерия выбора архитектурного решения.
  open_questions: []
- id: SAHP-003
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: слово «сложный» в названии двойственно — «трудный» и «неподатливый, образующий
    основу»; архитектура — это структурное понятие, «то, что потом сложно изменить»,
    в отличие от более податливого проектирования.
  excerpt: глава 1, раздел «Почему „сложные компромиссы“?».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Книга об «основополагающих» (сложных) частях архитектуры
    application: архитектор — различать редко меняемые структурные решения и легко
      меняемые детали реализации.
  open_questions: []
- id: SAHP-004
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: чтобы выводы не устаревали вместе с экосистемой, книга сосредоточена на том,
    как архитекторы принимают решения и объективно оценивают компромиссы, а не на
    конкретных технологиях; «почему» важнее, чем «как» (второй закон архитектуры из
    `Fundamentals of Software Architecture`).
  excerpt: глава 1, разделы «Советы… неподвластные времени», «Архитектура и проектирование».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Принципы важнее технологий и деталей реализации
    application: архитектор, технический писатель — фиксировать обоснование решения,
      а не только способ реализации.
  open_questions: []
- id: SAHP-005
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: данные обычно живут дольше систем и архитектуры; многие сложные компромиссы
    современной архитектуры возникают из противоречия между данными и архитектурой,
    особенно из привычки хранить все данные в одной реляционной базе.
  excerpt: глава 1, раздел «Важность данных в архитектуре».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Данные переживают системы и определяют архитектуру
    application: архитектор, аналитик — учитывать жизненный цикл данных при проектировании
      границ.
  open_questions: []
- id: SAHP-006
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: операционные данные (OLTP) используются для ведения бизнеса в реальном времени;
    аналитические данные используются для прогнозов, выявления тенденций и стратегических
    решений, часто нереляционны и не критичны для повседневной работы.
  excerpt: глава 1, раздел «Важность данных в архитектуре».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Разделение операционных и аналитических данных
    application: архитектор, аналитик — различать два класса данных при проектировании
      хранения.
  open_questions: []
- id: SAHP-007
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'один из эффективных способов документировать архитектурное решение — запись
    ADR: короткий документ с разделами «Контекст» (задача и альтернативы), «Решение»
    (выбор и обоснование) и «Последствия» (эффекты и рассмотренные компромиссы).'
  excerpt: глава 1, раздел «Запись архитектурных решений».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Запись архитектурных решений (ADR)
    application: архитектор, технический писатель — формат фиксации архитектурного
      решения.
  open_questions: []
- id: SAHP-008
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: функция пригодности — любой механизм, объективно оценивающий целостность архитектурной
    характеристики или их комбинации; она автоматизирует управление архитектурой так
    же, как модульные тесты проверяют предметную логику.
  excerpt: глава 1, раздел «Функции пригодности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Функции пригодности как объективная проверка архитектуры
    application: архитектор, разработчик — превращать архитектурные принципы в исполняемые
      проверки.
  open_questions: []
- id: SAHP-009
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: атомарная функция пригодности оценивает одну характеристику (например, отсутствие
    циклических зависимостей), комплексная — комбинацию взаимосвязанных характеристик;
    характеристики часто конфликтуют (безопасность и производительность, масштабируемость
    и адаптируемость).
  excerpt: глава 1, раздел «Функции пригодности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Атомарные и комплексные функции пригодности
    application: архитектор — выбирать тип проверки и учитывать конфликты характеристик.
  open_questions: []
- id: SAHP-010
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'разделить функцию пригодности и модульный тест помогает вопрос «Требуются
    ли знания предметной области для этой проверки?»: если да — это модульный/приёмочный
    тест, если нет — функция пригодности.'
  excerpt: глава 1, раздел «Функции пригодности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Граница между функцией пригодности и модульным тестом
    application: архитектор, разработчик — классифицировать проверки.
  open_questions: []
- id: SAHP-011
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: расплывчатые характеристики («гибкость») следует раскладывать на измеримые
    (развёртываемость, тестируемость, длительность цикла); функции пригодности следует
    запускать как можно чаще, обычно в конвейере непрерывной интеграции, иначе непроверяемое
    не контролируется.
  excerpt: глава 1, раздел «Функции пригодности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Измеримость характеристики и непрерывность проверок
    application: архитектор — требовать измеримых определений и непрерывной проверки.
  open_questions: []
- id: SAHP-012
  source_id: SAHP
  item_id: SAHP-text
  kind: observation
  status: ready_for_review
  text: 'книга использует упрощённые определения: сервис — связанный набор функций
    как независимый выполняемый файл; компонент — архитектурный строительный блок
    (пакет, пространство имён, каталог); связанность — изменение одного артефакта
    может потребовать изменения другого.'
  excerpt: глава 1, раздел «Архитектура и проектирование».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Простые определения ключевых понятий
    application: архитектор, технический писатель — единый словарь понятий.
  open_questions: []
- id: SAHP-013
  source_id: SAHP
  item_id: SAHP-text
  kind: observation
  status: ready_for_review
  text: абстрактные идеи иллюстрируются вымышленной историей команды поддержки Sysops
    Squad; история начинается с существующей системы, а не с нового проекта, и в каждой
    главе сопровождает обсуждаемые методы и компромиссы.
  excerpt: глава 1, раздел «Введение в сагу о Sysops Squad».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Сквозной пример — сага о Sysops Squad
    application: все роли — пример служит контекстом, а не готовым решением для других
      систем.
  open_questions: []
- id: SAHP-014
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: архитектурный квант — независимо развёртываемый артефакт с высокой функциональной
    связностью и синхронной связанностью во время выполнения; он включает не только
    код, но и операционные зависимости (базу данных, брокер, оркестратор контейнеров).
  excerpt: глава 2, разделы «Архитектурные кванты», «Тесная статическая связанность».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Архитектурный квант
    application: архитектор — единица анализа связанности распределённой архитектуры.
  open_questions: []
- id: SAHP-015
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'статическая связанность кванта — это зависимости, необходимые для запуска
    сервиса; вопрос проверки: «Необходима ли эта зависимость, чтобы данный сервис
    заработал?». Она строится на максимально строгих контрактах.'
  excerpt: глава 2, раздел «Тесная статическая связанность».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Статическая связанность
    application: архитектор — построение диаграммы статической связанности и оценка
      влияния изменений.
  open_questions: []
- id: SAHP-016
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: любая монолитная архитектура или распределённая система с единой общей базой
    данных образует один квант; общая точка сопряжения (база данных, оркестратор,
    общий пользовательский интерфейс) связывает систему в единый квант, даже если
    стиль распределённый.
  excerpt: глава 2, раздел «Тесная статическая связанность».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Единая точка сопряжения объединяет систему в один квант
    application: архитектор — оценка фактической, а не декларируемой изоляции сервисов.
      Опирается также на содержание диаграмм — сверять с PDF.
  open_questions: []
- id: SAHP-017
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'динамическая связанность описывает поведение квантов при синхронных взаимодействиях
    во время выполнения и определяется тремя взаимосвязанными силами: взаимодействия
    (синхронные/асинхронные), согласованность (атомарная/потенциальная) и координация
    (оркестрация/ хореография).'
  excerpt: глава 2, раздел «Динамическая связанность квантов».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Динамическая связанность и три силы
    application: архитектор — оси анализа распределённого рабочего процесса.
  open_questions: []
- id: SAHP-018
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: взаимодействия, согласованность и координация нельзя выбирать изолированно
    — каждая сила оказывает «гравитационное» воздействие на другие; например, поддержку
    транзакций проще обеспечить в синхронных решениях с посредником, а большую масштабируемость
    дают асинхронные системы с потенциальной согласованностью и хореографией.
  excerpt: глава 2, раздел «Динамическая связанность квантов».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Три силы влияют друг на друга
    application: архитектор — рассматривать комбинацию решений, а не отдельные оси.
  open_questions: []
- id: SAHP-019
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: при синхронном взаимодействии отправитель блокируется до ответа получателя;
    при асинхронном — продолжает работу после подтверждения приёма, часто через очередь
    сообщений, и при необходимости получает результат через отдельный канал.
  excerpt: глава 2, раздел «Взаимодействия».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Синхронные и асинхронные взаимодействия
    application: архитектор — выбор влияет на синхронизацию, обработку ошибок, транзакционность,
      масштабируемость и производительность.
  open_questions: []
- id: SAHP-020
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: согласованность — строгость требований к целостности данных при межсервисных
    транзакциях; на одном краю спектра атомарные транзакции «всё или ничего», на другом
    — разные виды потенциальной согласованности; транзакции, пересекающие границы
    сервисов, рекомендуется избегать.
  excerpt: глава 2, раздел «Согласованность».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Согласованность как спектр
    application: архитектор — оценка стоимости целостности данных в распределённой
      системе.
  open_questions: []
- id: SAHP-021
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: модульность — это разделение системы на части, а гранулярность (детализация)
    — размер этих частей; большинство сложностей распределённых систем связано не
    с модульностью, а с гранулярностью.
  excerpt: глава 7, вводный раздел.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Модульность и гранулярность — разные вещи
    application: архитектор — различать решение о разделении и решение о размере сервиса.
  open_questions: []
- id: SAHP-022
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: правильная гранулярность сервиса достигается уравновешиванием сил дезинтеграции
    (повод разделить сервис) и сил интеграции (повод объединить сервисы); частая ошибка
    — учитывать только силы дезинтеграции.
  excerpt: глава 7, разделы «Силы дезинтеграции гранулярности», «Силы интеграции гранулярности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Гранулярность определяется балансом сил
    application: архитектор — не дробить сервисы без учёта сил интеграции.
  open_questions: []
- id: SAHP-023
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'разделение сервиса на более мелкие части обосновывают шесть сил, каждая со
    своим вопросом-критерием: область действия и функциональность (много ли действий,
    не связанных с прямым предназначением, выполняет сервис?), изменчивость кода (изменения
    затрагивают только одну часть сервиса?), масштабируемость и пропускная способность
    (нужно ли по-разному масштабировать разные функции?), отказоустойчивость (сбой одной
    части роняет критичные функции?), безопасность (части требуют разного уровня защиты?),
    расширяемость (функции часто добавляют только в одну часть?).'
  excerpt: глава 7, раздел «Силы дезинтеграции гранулярности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Шесть сил дезинтеграции гранулярности
    application: архитектор — контрольный список причин для дробления сервиса.
  open_questions: []
- id: SAHP-024
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'объединение сервисов (или нежелательность их разделения) обосновывают четыре
    силы интеграции, каждая со своим вопросом: транзакции базы данных (нужны ли ACID-транзакции
    во взаимодействиях между сервисами?), рабочий процесс и хореография (должны ли сервисы
    взаимодействовать друг с другом?), общий код (есть ли совместно используемый сервисами
    код?), отношения в данных (можно ли разделить данные одновременно с разделением сервиса?).
    Правильная гранулярность — это анализ компромиссов между силами дезинтеграции и интеграции.'
  excerpt: глава 7, раздел «Силы интеграции гранулярности».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Силы интеграции гранулярности
    application: архитектор — контрольный список причин не дробить сервис.
  open_questions: []
- id: SAHP-025
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
