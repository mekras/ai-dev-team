- id: SAHP-068
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'паттерны повторного использования кода между сервисами (глава 8) и их компромиссы:
    репликация кода — копирование общего кода в каждый сервис (без совместного кода),
    сейчас почти не применяется, допустима для стабильного редко меняющегося кода; разделяемая
    библиотека — внешний артефакт (JAR, DLL), компонуемый во время компиляции, компромисс
    двух сил — управление зависимостями (просто при одной библиотеке) против управления
    изменениями (изменение требует повторного тестирования и развёртывания всех сервисов),
    более мелкая гранулярность и версионирование снижают влияние изменений; общий (разделяемый)
    сервис — общая функциональность как сервис времени выполнения, изменения затрагивают
    зависимые сервисы, а отказ общего сервиса делает их неработоспособными (связанность
    времени выполнения, производительность, отказоустойчивость); sidecar-компонент и сервисная
    сетка — для операционной (инфраструктурной) связанности, тогда как для предметной
    связанности в микросервисах часто предпочитают дублирование, а не зависимость.'
  excerpt: глава 8, разделы «Репликация кода», «Разделяемая библиотека», «Общий сервис»,
    «Sidecar-компоненты и сервисная сетка».
