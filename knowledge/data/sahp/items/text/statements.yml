- id: SAHP-070
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'транзакционные саги (глава 12) различаются по трём измерениям — взаимодействия
    (синхронные или асинхронные), согласованность (атомарная или потенциальная), координация
    (оркестрация или хореография); восемь сочетаний образуют именованные паттерны, верхний
    индекс кодирует измерения: Эпическая (Epic, сао), Переписка (Phone Tag, сах), Сказка
    (Fairy Tale, спо), Путешествие во времени (Time Travel, спх), Фантастика (Fantasy
    Fiction, аао), Ужасы (Horror Story, аах — антипаттерн), Параллельная (Parallel, апо),
    Антология (Anthology, апх). Каждый паттерн предлагает свой набор компромиссов; выбор
    — по нужному сочетанию трёх сил.'
  excerpt: глава 12, раздел «Паттерны транзакционных саг», таблица 12.1.
