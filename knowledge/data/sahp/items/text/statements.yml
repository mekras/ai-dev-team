- id: SAHP-055
  source_id: SAHP
  item_id: SAHP-text
  kind: observation
  status: ready_for_review
  text: 'книга использует упрощённые определения взаимодействий и координации: синхронное
    взаимодействие — вызывающая сторона ждёт ответа, прежде чем продолжить; асинхронное
    — не ждёт (при необходимости уведомляется по отдельному каналу); оркестрованная
    координация — в рабочем процессе есть сервис, чья основная обязанность — координация;
    хореографическая координация — координация распределена между сервисами без выделенного
    координатора; атомарность — все части рабочего процесса постоянно согласованы (противоположность
    — согласованность в конечном итоге).'
  excerpt: глава 1, раздел «Архитектура и проектирование».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Простые определения ключевых понятий (взаимодействия и координация)
    application: архитектор, технический писатель — единый словарь понятий.
  open_questions: []
- id: SAHP-056
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'книга различает масштабируемость и адаптируемость как операционные характеристики:
    масштабируемость — способность системы оставаться отзывчивой по мере нормального
    роста числа одновременно работающих пользователей в течение длительного времени;
    адаптируемость — способность оставаться отзывчивой при значительных мгновенных
    всплесках нагрузки; адаптируемость зависит от малого среднего времени запуска сервиса
    (MTTS) и достигается мелкой детализацией сервисов.'
  excerpt: глава 3, раздел «Различия между масштабируемостью и адаптируемостью».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Масштабируемость и адаптируемость
    application: архитектор — операционные характеристики при выборе гранулярности.
  open_questions: []
- id: SAHP-057
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'выбор метода декомпозиции монолита книга задаёт деревом решений: сначала определить,
    поддаётся ли база кода декомпозиции вообще; затем оценить структурированность кода
    — если это неструктурированная мешанина без чётко выделенных компонентов, уместнее
    тактическое ветвление; если код структурирован по функциональности с (чётко или
    нечётко) определёнными компонентами, предпочтительнее декомпозиция на основе компонентов.'
  excerpt: глава 4, раздел «Архитектурная декомпозиция», рис. 4.1.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Выбор метода декомпозиции
    application: архитектор — выбор подхода к разделению монолита.
  open_questions: []
- id: SAHP-058
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'книга описывает два распространённых подхода к разделению монолита. Декомпозиция
    на основе компонентов — создавать сервисы из компонентов (строительных блоков с
    чёткой ролью, ответственностью и набором операций, проявляющихся пространствами
    имён или каталогами), а не из отдельных классов. Тактическое ветвление (tactical
    forking, предложил Фаусто Де Ла Торре) — для слабо структурированных баз («большой
    ком грязи»): не извлекать части, а клонировать монолит и удалять ненужное. Достоинства
    тактического ветвления — быстрый старт почти без анализа и простота удаления кода
    в сравнении с извлечением; недостатки — в сервисах остаётся лишний код от монолита,
    качество кода само не улучшается, возможны конфликты общего кода.'
  excerpt: глава 4, разделы «Декомпозиция на основе компонентов», «Тактическое ветвление».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Подходы к декомпозиции монолита
    application: архитектор — разделение монолита на сервисы.
  open_questions: []
- id: SAHP-059
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'декомпозиция на основе компонентов выполняется шестью паттернами (глава 5):
    идентификация компонентов и их размеров (применяется первым); объединение общих
    компонентов предметной области (убрать дублирование общей бизнес-логики); упрощение
    иерархии компонентов (свернуть или расширить области и подобласти, чтобы файлы лежали
    в чётко определённых компонентах); определение зависимостей компонентов (выявить
    зависимости и оценить возможность и трудоёмкость перехода к распределённой архитектуре);
    создание предметных областей компонентов (объединить компоненты в логические группы,
    рефакторинг пространств имён или каталогов); создание предметных сервисов (физически
    вынести логические группы из монолита в отдельно развёртываемые предметные сервисы).'
  excerpt: глава 5, «Паттерны декомпозиции на основе компонентов».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Паттерны декомпозиции на основе компонентов
    application: архитектор — пошаговая декомпозиция монолита по компонентам.
  open_questions: []
- id: SAHP-060
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'афферентная и эфферентная связанность (показатели Юрдона и Константина, 1979):
    афферентная связанность (Ca) оценивается по количеству входящих связей с артефактом
    кода (компонентом, классом, функцией), эфферентная (Ce) — по количеству исходящих
    связей с другими артефактами; производная метрика нестабильности I = Ce / (Ce +
    Ca). Эти показатели особенно ценны при изменении структуры системы, например при
    декомпозиции монолита.'
  excerpt: глава 4, раздел «Афферентная и эфферентная связанность», уравнение 4.2.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Афферентная и эфферентная связанность
    application: архитектор — измерение сопряжения и устойчивости компонента.
  open_questions: []
- id: SAHP-061
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'функции пригодности реализуются кодом или готовыми инструментами (JDepend
    для циклических зависимостей, ArchUnit и NetArchTest для границ уровней, SonarQube
    и подобные) и обычно включаются в конвейер непрерывной интеграции; результат должен
    быть объективным — неконтекстное значение (true/false, числовой порог) либо динамическое
    значение, зависящее от контекста (например, порог производительности при росте
    числа пользователей). Часть проверок не автоматизируется и выполняется человеком
    как ручная функция пригодности на отдельном этапе конвейера; запускать функции
    следует как можно чаще, так как невыполняемая проверка ничего не контролирует.'
  excerpt: глава 1, раздел «Функции пригодности», примеры 1.1–1.3.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Реализация и запуск функций пригодности
    application: архитектор — написание и исполнение функций пригодности.
  open_questions: []
- id: SAHP-062
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'функции пригодности для управления автоматизируют контроль за дрейфом архитектуры
    при сопровождении и обычно запускаются при развёртывании в конвейере CI/CD; примеры:
    учёт имеющихся компонентов (уведомление о добавленных и удалённых компонентах сравнением
    с эталоном), ограничение доли компонента в коде заданным порогом (порог выбирается
    под размер приложения — например, 30 % для 10 компонентов и 10 % для 50), отсутствие
    кода в корневом пространстве имён и согласованность пространств имён внутри предметного
    сервиса (для каждого сервиса своя функция); типичные реализации — псевдокод-алгоритм
    с уведомлением архитектора или проверка через ArchUnit.'
  excerpt: глава 5, разделы «Функции пригодности для управления», примеры 5.1–5.11.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Функции пригодности для управления
    application: архитектор — контроль архитектурного дрейфа при сопровождении.
