- id: SAHP-063
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'детали применения паттернов декомпозиции на основе компонентов (глава 5).
    Идентификация компонентов и их размеров: выявить компоненты и оценить размер числом
    инструкций (не числом классов или строк); держать размеры сопоставимыми, в пределах
    одного-двух стандартных отклонений от среднего, разбивая слишком крупные. Объединение
    общих компонентов предметной области: общая предметная логика (рассылка уведомлений,
    форматирование, проверка, аудит) отличается от инфраструктурной (логирование, метрики,
    безопасность); признаки — общие классы или иерархии наследования у нескольких компонентов
    и общие суффиксы пространств имён (например, *.audit); такое выносится в общий компонент
    (например, ss.shared.audit), но не всё объединимо. Упрощение иерархии компонентов:
    делать иерархию плоской, чтобы компоненты были листовыми узлами пространства имён,
    без кода в нелистовых узлах. Определение зависимостей компонентов: анализ входящих
    и исходящих связей отвечает, можно ли разделить монолит, каков объём усилий и нужен
    ли рефакторинг. Создание предметных областей компонентов: группировать компоненты
    по функциональному признаку в области через пространства имён (область → подобласть
    → компонент). Создание предметных сервисов: вынести предметные области в отдельно
    развёртываемые крупномодульные предметные сервисы (архитектура на основе сервисов
    как промежуточный шаг перед более мелким дроблением).'
  excerpt: глава 5, разделы по паттернам, примеры 5.1–5.20.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Применение паттернов декомпозиции на основе компонентов
    application: архитектор — планирование применения паттернов декомпозиции.
  open_questions: []
- id: SAHP-064
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'движущие силы дезинтеграции данных отвечают на вопрос «когда разделять данные»;
    книга называет шесть: управление изменениями (на сколько сервисов повлияет изменение
    таблицы), управление соединениями (справится ли база с соединениями множества распределённых
    сервисов), масштабируемость (масштабируется ли база под требования использующих её
    сервисов), отказоустойчивость (на сколько сервисов повлияют сбои или обслуживание
    базы), архитектурные кванты (вынуждает ли единая база к нежелательной архитектуре
    с единственным квантом), оптимизация типа базы данных (можно ли оптимизировать доступ,
    используя несколько типов баз данных).'
  excerpt: глава 6, раздел «Движущие силы дезинтеграции данных».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Движущие силы дезинтеграции данных
    application: архитектор — обоснование разделения базы данных.
  open_questions: []
- id: SAHP-065
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'движущие силы интеграции данных отвечают на вопрос «когда сохранять данные вместе»
    и уравновешивают силы дезинтеграции; книга называет две: отношения в данных (внешние
    ключи, триггеры, представления, образующие тесные связи между таблицами) и транзакции
    базы данных (нужны ли транзакции для целостности и согласованности данных). Разделение
    выполняется итеративно — на отдельные предметные области, схемы и при необходимости
    отдельные базы данных.'
  excerpt: глава 6, разделы «Движущие силы интеграции данных», «Разделение данных».
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Движущие силы интеграции данных
    application: архитектор — баланс при решении о разделении базы данных.
  open_questions: []
- id: SAHP-066
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'декомпозиция монолитных данных выполняется пятью этапами: этап 1 — анализ базы
    данных и создание предметных областей данных (отход от стиля «общая база данных»,
    создающего тесную связь данных и сервисов); этап 2 — распределение таблиц по предметным
    областям с переносом в отдельные схемы (по ограниченным контекстам); этап 3 — разделение
    соединений так, чтобы каждый сервис обращался для чтения и записи только к своим
    схемам (самый сложный этап: межсхемные обращения разрешаются на уровне сервисов);
    этап 4 — перемещение схем на отдельные серверы баз данных (общая база — единый архитектурный
    квант, вредит масштабируемости и отказоустойчивости); этап 5 — переключение на независимые
    серверы: после репликации перенастроить соединения и удалить связи и схемы со старых
    серверов.'
  excerpt: глава 6, раздел «Декомпозиция монолитных данных», этапы 1–5.
  artifact: software-architecture-hard-parts-ru.txt
  checked_at: '2026-06-29'
  scope:
    section_title: Декомпозиция монолитных данных
    application: архитектор — планирование процесса разделения базы данных.
  open_questions: []
- id: SAHP-067
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'для выбора типа базы данных книга сравнивает типы по семи характеристикам: кривая
    обучения; простота моделирования данных; масштабируемость и пропускная способность;
    доступность и устойчивость к секционированию; согласованность (ACID или BASE с конечной
    согласованностью); поддержка языков, зрелость, SQL и сообщество; приоритет чтения
    или записи. Рассмотрены восемь типов: реляционные (РСУБД, SQL, ACID, зрелость); «ключ
    — значение» (как хеш-таблица, быстрый доступ по ключу); документные (самоописывающиеся
    иерархии JSON/XML); колоночные (широкие столбцы, записи с разным числом столбцов);
    графовые (узлы и явные рёбра-отношения для анализа связей); NewSQL (масштабируемость
    NoSQL с ACID и SQL); облачные (Snowflake, Redshift, CosmosDB — меньше операционной
    нагрузки); временных рядов (последовательности точек во времени, IoT и мониторинг).
    Каждый продукт оптимизирован под свои компромиссы, поэтому тип выбирают под предметную
    область («парадокс выбора»).'
  excerpt: глава 6, раздел «Выбор типа базы данных».
