- id: SAHP-069
  source_id: SAHP
  item_id: SAHP-text
  kind: fact
  status: ready_for_review
  text: 'паттерны распределённого доступа к данным (глава 10) и их компромиссы: взаимодействие
    между сервисами — сервис запрашивает данные у владельца удалённым вызовом; самый распространённый,
    но добавляет задержки (сеть, безопасность, база данных), связанность и зависимость
    от доступности владельца. Репликация схемы столбцов — копирование столбцов в таблицы
    другого контекста (обычно синхронизация асинхронными событиями); проблемы — синхронизация
    и согласованность данных, усложнение владения. Реплицированный кэш — данные в памяти
    каждого сервиса, постоянно синхронизируемые; быстрый доступ и развязка, но зависимость
    запуска, расход памяти и неприменимость для больших объёмов. Предметная область данных
    — общая схема, доступная нескольким сервисам; высокая согласованность и целостность
    ценой более широкого ограниченного контекста и совместного владения; применяют, когда
    другие паттерны не подходят.'
  excerpt: глава 10, разделы по четырём паттернам доступа к данным.
