- id: OWTT-003
  source_id: OWTT
  item_id: OWTT-normalized-OWTT-source.md
  kind: fact
  status: ready_for_review
  text: категория A04 «Insecure Design» подчёркивает моделирование угроз и безопасное
    проектирование; категории связаны со слабостями `CWE`; для проверяемых требований
    используется `ASVS`.
  excerpt: описание категорий и связей.
