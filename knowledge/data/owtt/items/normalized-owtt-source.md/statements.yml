- id: OWTT-002
  source_id: OWTT
  item_id: OWTT-normalized-OWTT-source.md
  kind: fact
  status: ready_for_review
  text: редакция 2021 включает A01 Broken Access Control, A02 Cryptographic Failures,
    A03 Injection, A04 Insecure Design, A05 Security Misconfiguration, A06 Vulnerable
    and Outdated Components, A07 Identification and Authentication Failures, A08 Software
    and Data Integrity Failures, A09 Security Logging and Monitoring Failures, A10
    Server-Side Request Forgery (SSRF).
  excerpt: перечень категорий.
  artifact: source.md
  checked_at: '2026-06-25'
  scope:
    section_title: Категории редакции 2021
    application: специалист по безопасности, разработчик.
