- id: OSIL-003
  source_id: OSIL
  item_id: OSIL-licenses
  kind: fact
  status: ready_for_review
  text: сайт OSI отделяет свои авторские материалы сайта от текстов самих лицензий
    и указывает, что вопросы copyright по тексту лицензии нужно направлять соответствующему
    steward.
  excerpt: нижний блок страницы `licenses`.
  artifact: index.html
  checked_at: '2026-06-05'
  scope:
