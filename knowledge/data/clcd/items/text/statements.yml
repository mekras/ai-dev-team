- id: CLCD-002
  source_id: CLCD
  item_id: CLCD-text
  status: вывод источника
  text: Профессиональная обязанность программиста включает сопротивление давлению,
    которое ведёт к ухудшению кода ради краткосрочной скорости.
  excerpt: Профессиональная обязанность программиста включает сопротивление давлению,
    которое ведёт к ухудшению кода ради краткосрочной скорости.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
