  item_id: CLCD-text
  status: вывод источника
  text: 'Чистота кода влияет на скорость развития продукта: работающий, но грязный
    код постепенно повышает стоимость изменений и сопровождения.'
  excerpt: 'Чистота кода влияет на скорость развития продукта: работающий, но грязный
    код постепенно повышает стоимость изменений и сопровождения.'
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
