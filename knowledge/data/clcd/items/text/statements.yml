  kind: observation
  status: verified
  text: Комментарии не должны компенсировать плохой код; если смысл можно выразить именем, функцией или структурой, предпочтительно улучшить код.
  excerpt: комментарии не должны компенсировать плохой код; если смысл можно выразить именем, функцией или структурой, предпочтительно улучшить код
