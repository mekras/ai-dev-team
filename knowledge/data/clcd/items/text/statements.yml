  status: наблюдение
  text: Модульные тесты должны быть читаемыми, быстрыми, независимыми, повторяемыми
    и достаточно точными, чтобы поддерживать безопасный рефакторинг.
  excerpt: Модульные тесты должны быть читаемыми, быстрыми, независимыми, повторяемыми
    и достаточно точными, чтобы поддерживать безопасный рефакторинг.
