- id: CLCD-003
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Код следует оставлять чище, чем он был до изменения; небольшие локальные улучшения
    являются частью нормальной работы с кодом.
  excerpt: Код следует оставлять чище, чем он был до изменения; небольшие локальные
    улучшения являются частью нормальной работы с кодом.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-004
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Имена должны передавать намерение, избегать дезинформации, быть удобными для
    поиска и использовать одно слово для одной концепции.
  excerpt: Имена должны передавать намерение, избегать дезинформации, быть удобными
    для поиска и использовать одно слово для одной концепции.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-005
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Функция должна быть компактной, выполнять одну операцию, работать на одном
    уровне абстракции и иметь содержательное имя.
  excerpt: Функция должна быть компактной, выполнять одну операцию, работать на одном
    уровне абстракции и иметь содержательное имя.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-006
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Большое число аргументов, аргументы-флаги и смешение команд с запросами ухудшают
    понятность функции и повышают риск ошибки.
  excerpt: Большое число аргументов, аргументы-флаги и смешение команд с запросами
    ухудшают понятность функции и повышают риск ошибки.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-007
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Комментарии не должны компенсировать плохой код; если смысл можно выразить
    именем, функцией или структурой, предпочтительно улучшить код.
  excerpt: Комментарии не должны компенсировать плохой код; если смысл можно выразить
    именем, функцией или структурой, предпочтительно улучшить код.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-008
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Полезный комментарий объясняет намерение, предупреждает о последствиях или
    фиксирует контекст, который нельзя ясно выразить самим кодом.
  excerpt: Полезный комментарий объясняет намерение, предупреждает о последствиях
    или фиксирует контекст, который нельзя ясно выразить самим кодом.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-009
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: 'Форматирование кода должно помогать чтению: связанные элементы должны быть
    близко, уровни вложенности видимы, а структура файла предсказуема.'
  excerpt: 'Форматирование кода должно помогать чтению: связанные элементы должны
    быть близко, уровни вложенности видимы, а структура файла предсказуема.'
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-010
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: 'Объекты и структуры данных имеют разные цели: объект скрывает данные за поведением,
    а структура данных открывает данные без значимого поведения.'
  excerpt: 'Объекты и структуры данных имеют разные цели: объект скрывает данные за
    поведением, а структура данных открывает данные без значимого поведения.'
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-011
  source_id: CLCD
  item_id: CLCD-text
  status: наблюдение
  text: Обработка ошибок должна сохранять основной путь выполнения читаемым, передавать
    контекст исключения и избегать возврата или передачи `null`.
  excerpt: Обработка ошибок должна сохранять основной путь выполнения читаемым, передавать
    контекст исключения и избегать возврата или передачи `null`.
  artifact: clean-code-martin-ru.txt
  checked_at: '2026-06-25'
  scope:
    section_title: ''
    application: ''
  open_questions: []
- id: CLCD-012
  source_id: CLCD
  item_id: CLCD-text
  status: вывод источника
  text: Границы со сторонним кодом нужно изолировать так, чтобы детали чужого API
    не распространялись по системе.
  excerpt: Границы со сторонним кодом нужно изолировать так, чтобы детали чужого API
