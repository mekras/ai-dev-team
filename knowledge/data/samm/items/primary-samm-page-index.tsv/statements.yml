- id: SAMM-001
  source_id: SAMM
  item_id: SAMM-primary-SAMM-page-index.tsv
  kind: fact
  status: ready_for_review
  text: SAMM — открытая модель оценки и улучшения программы безопасной разработки
    ПО; она технологически нейтральна и применяется итеративно (оценка → цели → план
    улучшений).
  excerpt: вводный раздел.
  artifact: page-index.tsv
  checked_at: '2026-06-25'
  scope:
    section_title: Назначение модели
    application: специалист по безопасности, project-manager.
  open_questions: []
- id: SAMM-002
  source_id: SAMM
  item_id: SAMM-primary-SAMM-page-index.tsv
  kind: fact
  status: ready_for_review
  text: 'модель построена вокруг пяти бизнес-функций: Governance, Design, Implementation,
    Verification, Operations.'
  excerpt: оглавление и обзор практик.
  artifact: page-index.tsv
  checked_at: '2026-06-25'
  scope:
