- id: SAMM-003
  source_id: SAMM
  item_id: SAMM-primary-SAMM-page-index.tsv
  kind: fact
  status: ready_for_review
  text: в каждой бизнес-функции по три практики безопасности (всего 15); каждая практика
    имеет два потока (stream A/B) и три уровня зрелости.
  excerpt: обзор практик и модель зрелости.
  artifact: page-index.tsv
  checked_at: '2026-06-25'
  scope:
    section_title: Пятнадцать практик безопасности
