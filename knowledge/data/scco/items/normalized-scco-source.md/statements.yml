statements:
- id: SCCO-001
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: переход к Scrum рассматривается как организационное изменение, а не как разовое
    внедрение процесса; конечное состояние перехода непредсказуемо, а совершенствование
    продолжается циклически и после внедрения.
  excerpt: глава 1, раздел о трудностях перехода.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Внедрение Scrum как изменение
    application: project-manager — рамка для планирования внедрения как длительного
      изменения, а не разовой задачи.
  open_questions: []
- id: SCCO-002
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: успешное внедрение Scrum не достигается исключительно «сверху вниз» или «снизу
    вверх»; нужны и инициатива команд, и поддержка руководства.
  excerpt: глава 1, раздел о принципе перехода.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Внедрение Scrum как изменение
    application: project-manager — обоснование совмещения управленческой и командной
      поддержки внедрения.
  open_questions: []
- id: SCCO-003
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: 'модель ADAPT описывает пять типичных действий перехода: Awareness (осознание),
    Desire (желание), Ability (способность), Promotion (продвижение), Transfer (распространение);
    осознание, желание и способность перекрываются, а продвижение и распространение
    повторяются на протяжении всего перехода.'
  excerpt: глава 2, введение и рис. 2.1.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модель ADAPT
    application: project-manager — выбор действий перехода под текущую фазу команды
      или организации.
  open_questions: []
- id: SCCO-004
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: ADAPT применяется на четырёх уровнях — организации в целом, индивида, команды
    и отдельного технического приёма; люди и команды проходят цикл с разной скоростью.
  excerpt: глава 2, раздел об уровнях применения ADAPT.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модель ADAPT
    application: project-manager — диагностика уровня, на котором застопорился переход.
  open_questions: []
- id: SCCO-005
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: осознание (Awareness) — признание того, что текущий процесс не даёт приемлемых
    результатов; инструменты осознания нужны, пока люди путают движение с прогрессом
    или полагаются на собственную пропаганду успехов.
  excerpt: глава 2, раздел «Осознание».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модель ADAPT
    application: project-manager — подбор инструментов осознания на старте перехода.
  open_questions: []
- id: SCCO-006
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: желание (Desire), способность (Ability), продвижение (Promotion) и распространение
    (Transfer) различаются по цели — мотивация перейти, освоение приёмов на практике,
    распространение опыта успеха и перенос Scrum на другие подразделения.
  excerpt: глава 2, разделы «Желание», «Способность», «Продвижение», «Распространение».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модель ADAPT
    application: project-manager — различение четырёх поздних действий перехода при
      планировании внедрения.
  open_questions: []
- id: SCCO-007
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: первая ось выбора внедрения — постепенный против одновременного перехода; постепенный
    снижает риск и выращивает собственных специалистов, одновременный выбирают при
    дефиците времени и для снятия «организационного диссонанса».
  excerpt: 'глава 3, раздел «Массовость: за и против».'
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модели внедрения
    application: project-manager — выбор темпа внедрения с явным обоснованием.
  open_questions: []
- id: SCCO-008
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: вторая ось выбора внедрения — открытый против скрытого варианта; открытый выбирают
    при уверенности и для получения поддержки, скрытый — для эксперимента или при ожидании
    жёсткого сопротивления.
  excerpt: глава 3, раздел «Открытый и скрытый варианты перехода».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модели внедрения
    application: project-manager — выбор публичности внедрения под уровень риска и
      сопротивления.
  open_questions: []
- id: SCCO-009
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: 'опыт Scrum распространяют тремя способами: «разделить и засеять» (исходную
    команду делят, каждая часть становится ядром новой), «нарастить и разделить» (команда
    растёт, затем делится) и внутреннее наставничество.'
  excerpt: глава 3, разделы о распространении опыта.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Модели внедрения
    application: project-manager — выбор способа тиражирования практики на новые команды.
  open_questions: []
- id: SCCO-010
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: журнал совершенствования (improvement backlog) — динамический приоритизированный
    перечень целей и задач внедрения Scrum, который обновляется по мере выполнения,
    как журнал запросов на продукт.
  excerpt: глава 4, раздел «Журнал совершенствования».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Сообщества улучшений
    application: project-manager — ведение перехода через явный приоритизированный
      журнал улучшений.
  open_questions: []
- id: SCCO-011
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: сообщество в поддержку перехода (ETC, Enterprise Transition Community) — группа
    руководителей, которая инициирует и поддерживает переход, работает спринтами, формирует
    контекст, стимулирует диалог и выделяет ресурсы, демонстрируя результаты, а не
    планы.
  excerpt: глава 4, раздел о сообществе в поддержку перехода.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Сообщества улучшений
    application: project-manager — организация управляющего органа внедрения на уровне
      предприятия.
  open_questions: []
- id: SCCO-012
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: сообщества в поддержку усовершенствований (IC, Improvement Communities) работают
    над конкретными целями (например автоматизация тестов, непрерывная интеграция),
    открыты для добровольного участия, работают спринтами и могут распускаться по достижении
    цели.
  excerpt: глава 4, раздел о сообществах в поддержку усовершенствований.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Сообщества улучшений
    application: project-manager — организация целевых сообществ практиков под конкретные
      улучшения.
  open_questions: []
- id: SCCO-013
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: 'идеальный пилотный проект имеет четыре характеристики: средняя продолжительность,
    небольшой масштаб (одна команда), высокая важность для бизнеса и активный бизнес-спонсор.'
  excerpt: глава 5, раздел о характеристиках пилотного проекта.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Первые проекты
    application: project-manager — отбор первого проекта внедрения по проверяемым критериям.
  open_questions: []
- id: SCCO-014
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: ожиданиями относительно прогресса и предсказуемости нужно управлять — первые
    спринты обычно ниже плана, скорость команды нестабильна первые несколько спринтов,
    поэтому жёсткие штрафные контракты для пилота неуместны.
  excerpt: глава 5, разделы об ожиданиях прогресса и предсказуемости.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Первые проекты
    application: project-manager — формулировка реалистичных ожиданий по пилотному
      проекту.
  open_questions: []
- id: SCCO-015
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: сопротивление переменам предсказуемо и трактуется как полезный предупреждающий
    сигнал о реальных проблемах, а не только как помеха.
  excerpt: глава 6, раздел о сопротивлении как сигнале.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Сопротивление
    application: project-manager — использование сопротивления как источника информации
      о рисках внедрения.
  open_questions: []
- id: SCCO-016
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: 'индивидуальное сопротивление делится на типы: скептики, саботажники, консерваторы
    и последователи; с каждым типом работают по-разному.'
  excerpt: глава 6, разделы о типах сопротивляющихся.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Сопротивление
    application: project-manager — адресная работа с разными типами сопротивления.
  open_questions: []
- id: SCCO-017
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: на восприятие перемен влияют послания лидеров и мнение коллег; одноразовые
    «крики о кризисе» неэффективны из-за эффекта «мальчика, кричащего о волке».
  excerpt: глава 6, раздел «Информация о переменах».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Сопротивление
    application: project-manager — построение коммуникации внедрения через лидеров
      и коллег.
  open_questions: []
- id: SCCO-018
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: ScrumMaster — служащий лидер (служит команде, как тренер), управляет процессом
    (например длиной спринта), но не имеет властных полномочий командовать людьми;
    технические решения принадлежат команде.
  excerpt: глава 7, раздел «Роль Scrum-мастера».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager — корректная постановка роли Scrum-мастера без подмены
      командования.
  open_questions: []
- id: SCCO-019
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: 'хороший Scrum-мастер обладает определёнными качествами (ответственность,
    скромность, готовность к сотрудничеству) и устраняет препятствия, а не принимает
    решения за команду.'
  excerpt: глава 7, раздел «Качества хорошего Scrum-мастера».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager — критерии подбора и оценки Scrum-мастера.
  open_questions: []
- id: SCCO-020
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: технический лидер часто плохо подходит на роль Scrum-мастера, потому что привык
    принимать решения и командовать, а не помогать команде; роль предпочтительно растить
    из собственных сотрудников, а не держать на приглашённых консультантах постоянно.
  excerpt: глава 7, разделы о технических лидерах и собственных Scrum-мастерах.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager — выбор источника и профиля Scrum-мастера.
  open_questions: []
- id: SCCO-021
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: каждой команде нужен ровно один владелец продукта; при нескольких владельцах
    команда обращается к более уступчивому, что разрушает приоритеты.
  excerpt: глава 7, раздел «Каждой команде нужен только один владелец продукта».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager — правило одного владельца продукта на команду при
      организации работы.
  open_questions: []
- id: SCCO-022
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: владелец продукта отвечает за видение, границы (время, стоимость, качество,
    объём) и приоритеты журнала запросов; задачи можно делегировать, но ответственность
    за решения остаётся за ним.
  excerpt: глава 7, раздел «Обязанности владельца продукта».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: analyst, project-manager — закрепление обязанностей владельца продукта.
  open_questions: []
- id: SCCO-023
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: владелец продукта должен быть доступен команде и иметь реальные властные полномочия;
    задержки с ответами и отмена его решений вышестоящим руководством разрушают ритм
    и заставляют команду обходить владельца продукта.
  excerpt: глава 7, разделы о доступности и полномочиях владельца продукта.
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager — условия результативной работы владельца продукта.
  open_questions: []
- id: SCCO-024
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: роль аналитика смещается от крупного предварительного анализа к анализу «точно
    вовремя» — информация предоставляется команде непосредственно перед тем, как она
    понадобится.
  excerpt: глава 8, раздел «Аналитики».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: analyst — режим работы аналитика в Scrum без полной спецификации
      заранее.
  open_questions: []
- id: SCCO-025
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: должность руководителя проекта в прежнем виде исчезает, а обязанности перераспределяются
    между Scrum-мастером, владельцем продукта и командой; смена названия должности
    сигнализирует о новом способе работы.
  excerpt: глава 8, раздел «Руководители проектов».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager — переосмысление роли руководителя проекта при переходе.
  open_questions: []
- id: SCCO-026
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: архитектор влияет на команду через авторитет и заслуженное доверие, а не через
    властные полномочия; возможен архитектор, не занимающийся кодированием, но проектирование
    остаётся встроенным в работу команды.
  excerpt: глава 8, раздел «Архитекторы».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: software-architect — позиционирование архитектора в самоорганизующейся
      команде.
  open_questions: []
- id: SCCO-027
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: изменяются роли функциональных менеджеров, программистов, администраторов
    базы данных, тестировщиков и проектировщиков пользовательского опыта; у этих изменений
    есть три общие темы смещения к командной и межфункциональной работе.
  excerpt: глава 8, разделы об изменившихся ролях и «Три общие темы».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: project-manager, ux-specialist — перестройка специализированных ролей
      под командную работу.
  open_questions: []
- id: SCCO-028
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: тестировщики в Scrum работают внутри команды и в течение спринта, а не отдельной
    поздней фазой; их роль смещается к встроенному и автоматизированному тестированию.
  excerpt: глава 8, раздел «Тестеры».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Роли
    application: coder — встраивание тестирования в работу команды, а не отдельной
      фазой.
  open_questions: []
- id: SCCO-029
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: проектирование на основе тестирования (TDD) задаёт структуру кода тестами
    и ловит проблемы рано, обеспечивая покрытие кода тестами.
  excerpt: глава 9, раздел «Проектирование на основе тестирования».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Инженерные приёмы качества
    application: coder — обоснование практики TDD как инженерного приёма Scrum.
  open_questions: []
- id: SCCO-030
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: рефакторинг постоянными малыми улучшениями удерживает систему сопровождаемой;
    откладывание рефакторинга наращивает технический долг.
  excerpt: глава 9, раздел «Рефакторинг».
  artifact: source.md
  checked_at: '2026-06-29'
  scope:
    section_title: Инженерные приёмы качества
    application: coder — обоснование непрерывного рефакторинга.
  open_questions: []
- id: SCCO-031
  source_id: SCCO
  item_id: SCCO-normalized-SCCO-source.md
  status: ready_for_review
  text: коллективное владение кодом означает, что любой разработчик может работать
