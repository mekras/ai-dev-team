- id: SMAS-032
  source_id: SMAS
  item_id: SMAS-text
  status: ready_for_review
  text: для внешнего домена доступ — OAuth 2.0 с непрозрачным токеном; для внешнего
    домена доверие (и доступ внутренних доменов) — доверие на основе сертификатов
    и подписанных JWT; для внутренних доменов доверие смещено к производительности
    (изоляция сети, коллокация), но JWT может передаваться для учёта и наблюдаемости.
  excerpt: глава 3, раздел «Trust and Access Mechanisms».
