statements:
- id: SREQ-001
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: клиенты часто смешивают бизнес-цели проекта и собственно требования к системе,
    поэтому аналитик должен разделять бизнес-, пользовательский и функциональный уровни
    требований.
  excerpt: обсуждение разрыва ожиданий и различия уровней требований в главе 2.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: выявление требований и работа с ожиданиями заказчика.
  open_questions: []
- id: SREQ-002
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: роль бизнес-аналитика включает определение бизнес-требований, планирование
    работы с требованиями, выявление, анализ, документирование, доведение до участников,
    проверку, приоритизацию и управление требованиями.
  excerpt: раздел `Задачи аналитика` в главе 4.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: проектирование ролей и обязанностей в работе с требованиями.
  open_questions: []
- id: SREQ-003
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: при выявлении требований полезно классифицировать высказывания участников
    по типам, включая бизнес-требования, пользовательские требования, бизнес-правила,
    функциональные требования, атрибуты качества, требования к внешним интерфейсам,
    ограничения, определения данных и идеи решений.
  excerpt: классификация предоставляемой клиентом информации в главе 7.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: разбор сырого материала после интервью и семинаров.
  open_questions: []
- id: SREQ-004
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: подразумеваемые и неявные требования нужно искать отдельно, потому что именно
    они часто создают разрыв между ожиданиями и реализованной системой; для этого
    полезны повторные вопросы, поиск парных требований, проверка границ, моделей и
    операций CRUD.
  excerpt: разделы `Подразумеваемые и неявные требования` и Поиск упущенных требований`
    в главе 7.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: снижение пропусков и недостающих требований.
  open_questions: []
- id: SREQ-005
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: варианты использования полезны как форма пользовательских требований, но детализировать
    их надо только в горизонте ближайшей реализации, иначе команда тратит силы на
    описание сценариев, которые ещё успеют измениться.
  excerpt: завершающие замечания главы 8.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: дозирование детализации пользовательских требований.
  open_questions: []
- id: SREQ-006
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: бизнес-правила следует хранить как отдельный массив знаний, а не смешивать
    с бизнес-требованиями и бизнес-процессами; базовая таксономия включает факты,
    ограничения, активаторы операций, выводы и вычисления.
  excerpt: главы 9, разделы `Классификация бизнес-правил` и Бизнес-правила и требования`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: структура источников требований и вывод функциональных требований
      из правил.
  open_questions: []
- id: SREQ-007
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: при работе с фактами как типом бизнес-правил нужно ограничивать сбор сведений
    границами проекта и по возможности связывать каждый факт с входами и выходами
    контекстной диаграммы, событиями системы, объектами данных или конкретными пользовательскими
    требованиями.
  excerpt: раздел `Факты` в главе 9.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: отбор фактов для корпуса и анализа.
  open_questions: []
- id: SREQ-008
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: шаблон спецификации требований к ПО рассматривается как структурированный
    и последовательный способ организации функциональных и нефункциональных требований,
    причём организация может использовать больше одного шаблона для разных типов и
    масштабов проектов.
  excerpt: раздел о шаблоне спецификации требований к ПО.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: оформление проектных шаблонов требований.
  open_questions: []
- id: SREQ-009
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: качественное отдельное требование должно быть как минимум полным, корректным,
    осуществимым и необходимым, а его качество следует подтверждать рецензированием
    несколькими заинтересованными лицами.
  excerpt: глава 11, раздел `Характеристики превосходных требований`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: проверка качества формулировок требований.
  open_questions: []
- id: SREQ-010
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: требования к атрибутам качества нужно по возможности снабжать источником и
    обоснованием, а сами цели выражать измеримо; значения вроде 100%` для доступности
    или надёжности практически недостижимы и резко повышают стоимость решения.
  excerpt: глава 14, разделы `Определение требований по качеству`, Доступность` и
    `Цена качества`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: запись нефункциональных требований и оценка их цены.
  open_questions: []
- id: SREQ-011
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: приоритизация требований является динамическим процессом балансировки ценности
    и ограничений проекта; для практической работы авторы предпочитают трёхуровневую
    шкалу на основе важности и срочности и прямо не рекомендуют схему MoSCoW.
  excerpt: глава 16, разделы о целях приоритизации, трёхуровневой шкале и MoSCoW.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: правила приоритизации требований и резерва работ.
  open_questions: []
- id: SREQ-012
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: 'утверждение требований и верификация связаны, но не совпадают: утверждение
    проверяет, что выбраны правильные требования для потребностей клиента, а верификация
    — что требования и продукт описаны и реализованы правильно; формальные рецензии
    и экспертизы дают высокий возврат на затраченное время.'
  excerpt: глава 17, разделы `Утверждение и верификация` и Рецензирование требований`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: организация проверки требований до реализации.
  open_questions: []
- id: SREQ-013
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: управление версиями требований должно начинаться с ранних черновиков, обеспечивать
    уникальную идентификацию версий, историю изменений, ограниченный круг редакторов
    и явное доведение актуальной версии до всех участников.
  excerpt: глава 27, раздел `Управление версиями требований`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: процесс сопровождения документов требований.
  open_questions: []
- id: SREQ-014
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: анализ влияния изменений обязателен даже для на первый взгляд малых запросов
    и должен охватывать бизнес-последствия, затронутые требования и артефакты, а также
    задачи и усилия на реализацию изменения.
  excerpt: глава 28, раздел `Анализ влияния изменений`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: управление изменениями требований.
  open_questions: []
- id: SREQ-015
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: документ о концепции и границах собирает бизнес-требования в единое основание
    для последующей разработки и фиксирует высокоуровневые границы продукта.
  excerpt: глава 5, раздел `Документ о концепции и границах`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: стартовая структура документации проекта и фиксация бизнес-основания.
  open_questions: []
- id: SREQ-016
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: владельцем документа о концепции и границах должен быть куратор проекта или
    лицо с аналогичной ответственностью, а бизнес-аналитик может помогать в его подготовке.
  excerpt: глава 5, раздел `Документ о концепции и границах`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: распределение ответственности за бизнес-документы.
  open_questions: []
- id: SREQ-017
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: 'рекомендуемый шаблон концепции и границ включает три крупных блока: бизнес-требования,
    рамки и ограничения проекта, бизнес-контекст.'
  excerpt: глава 5, шаблон документа о концепции и границах.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: проектирование структуры вводных документов проекта.
  open_questions: []
- id: SREQ-018
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: 'шаблоны документов полезны не только для единообразия, но и как средство
    обнаружения пробелов: пустой раздел должен быть осознанно заполнен, удалён или
    помечен как неприменимый.'
  excerpt: глава 5, раздел об использовании шаблонов.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: техническое письмо и проектные шаблоны требований.
  open_questions: []
- id: SREQ-019
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: бизнес-цели должны формулироваться измеримо, потому что именно они помогают
    оценивать ценность функций, границы проекта и приоритеты.
  excerpt: глава 5, раздел `Бизнес-цели`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: анализ требований и управление границами проекта.
  open_questions: []
- id: SREQ-020
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: при появлении нового требования аналитик должен соотнести его с границами
    проекта и бизнес-целями, после чего требование можно отклонить, отложить, включить
    или пересмотреть границы проекта.
  excerpt: глава 5, разделы о границах проекта и бизнес-целях.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: управление границами и резервом требований.
  open_questions: []
- id: SREQ-021
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: 'контекстная диаграмма, карта экосистемы и список событий дополняют друг друга:
    первая показывает внешние сущности, вторая окружение, а список событий фиксирует
    внешние триггеры поведения системы.'
  excerpt: глава 5, разделы о способах представления границ проекта.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: анализ границ продукта и проектирование документации требований.
  open_questions: []
- id: SREQ-022
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: список событий можно использовать как средство разграничения выпусков или
    итераций, потому что каждое событие может быть связано с конкретным поведением
    системы и планом реализации.
  excerpt: глава 5, раздел `Список событий`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: планирование содержания выпусков и итераций.
  open_questions: []
- id: SREQ-023
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: классы пользователей следует выделять по задачам, функциям, частоте использования,
    правам доступа, опыту, платформе, языку и способу доступа, а не подменять их рыночными
    сегментами.
  excerpt: глава 6, раздел `Классификация пользователей`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: выявление требований и проектирование пользовательской документации.
  open_questions: []
- id: SREQ-024
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: в проекте нужно различать привилегированные, непривилегированные, игнорируемые
    и прочие классы пользователей, потому что их вес при конфликте требований и приоритизации
    различается.
  excerpt: глава 6, раздел `Классификация пользователей`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: анализ заинтересованных лиц и приоритизация требований.
  open_questions: []
- id: SREQ-025
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: косвенные пользователи, установщики, специалисты поддержки, разработчики и
    другие неочевидные участники могут быть источниками требований, особенно по данным,
    установке, поддержке и внутренним атрибутам качества.
  excerpt: глава 6, обсуждение классов пользователей и других заинтересованных лиц.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: выявление источников требований и аудит полноты документации.
  open_questions: []
- id: SREQ-026
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: для каждого важного класса пользователей нужен представитель, который понимает
    свою роль, имеет полномочия принимать решения на уровне пользовательских требований
    и представляет класс пользователей, а не только личные предпочтения.
  excerpt: глава 6, разделы о стороннике продукта и рисках этой роли.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: организация выявления требований и принятия решений.
  open_questions: []
- id: SREQ-027
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: один владелец продукта в гибкой разработке не всегда способен заменить представительство
    всех классов пользователей; при сложной предметной области полезны несколько представителей
    и бизнес-аналитики.
  excerpt: глава 6, раздел Представительство пользователей в проектах гибкой разработки`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: организация ролей в проектах и настройка процесса требований.
  open_questions: []
- id: SREQ-028
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: выявление требований обычно требует сочетания коллективных и независимых методов,
    потому что разные методы дают разные типы информации и подходят разным заинтересованным
    лицам.
  excerpt: глава 7, раздел `Методы выявления требований`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: план выявления требований.
  open_questions: []
- id: SREQ-029
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: интервью подходят для быстрого входа в предметную область, работы с экспертами,
    сбора бизнес-требований у руководителей и уточнения деликатных вопросов в малой
    группе.
  excerpt: глава 7, раздел `Интервью`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: выбор метода выявления требований.
  open_questions: []
- id: SREQ-030
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: семинар по выявлению требований требует явных ролей, подготовленной повестки,
    правил обсуждения, фиксации решений и контроля границ проекта.
  excerpt: глава 7, раздел `Семинары`.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: организация группового выявления требований.
  open_questions: []
- id: SREQ-031
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: после мероприятий по выявлению требований нужно рассылать протоколы, фиксировать
    открытые вопросы и классифицировать полученную от клиента информацию по типам
    требований и смежных материалов.
  excerpt: глава 7, разделы о действиях после выявления требований и классификации
    информации.
  artifact: software-requirements-3rd-ru.txt
  checked_at: '2026-06-22'
  scope:
    section_title: ''
    application: обработка первичных материалов аналитиком и техническим писателем.
  open_questions: []
- id: SREQ-032
  source_id: SREQ
  item_id: SREQ-text
  status: ready_for_review
  text: спецификация требований не должна быть единственным документом для всех аудиторий;
