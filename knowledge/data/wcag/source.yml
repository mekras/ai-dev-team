title: '`Web Content Accessibility Guidelines (WCAG) 2.2` — рекомендация W3C по доступности
  цифрового контента. Организует требования вокруг четырёх принципов (воспринимаемость,
  управляемость, понятность, надёжность) и задаёт проверяемые критерии успеха с уровнями
  соответствия `A`, `AA`, `AAA`.'
