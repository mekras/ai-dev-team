  status: наблюдение
  text: Техническое задание трактуется как основополагающий формальный документ, который
    должны единообразно понимать заказчик, руководители и исполнители проекта.
  excerpt: Техническое задание трактуется как основополагающий формальный документ,
    который должны единообразно понимать заказчик, руководители и исполнители проекта.
