- id: RTZ-002
  source_id: RTZ
  item_id: RTZ-text
  status: факт
  text: 'Любое техническое задание должно отражать: что нужно сделать; с какой целью;
    в какой области применения; какие требования предъявляются; какие работы нужно
    выполнить; каков порядок приёмки-сдачи; как документируется проведение работ;
    на основании каких нормативно-технических документов ведутся работы.'
  excerpt: 'Любое техническое задание должно отражать: что нужно сделать; с какой
