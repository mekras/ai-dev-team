  status: факт
  text: 'Пособие различает три семейства стандартов на техническое задание: ГОСТ 2.114-95
    (аппаратное обеспечение, технические условия), ГОСТ 19.201-78 (программы) и ГОСТ
    34.602-89 (автоматизированные системы).'
  excerpt: 'Пособие различает три семейства стандартов на техническое задание: ГОСТ
