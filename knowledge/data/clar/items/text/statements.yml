statements:
- id: CLAR-001
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: между понятиями «дизайн» и «архитектура» нет принципиальной разницы; низкоуровневые
    детали и высокоуровневая структура образуют единое непрерывное полотно решений
    разного уровня детализации, и чёткой линии между ними нет.
  excerpt: глава 1, разделы «Что такое дизайн и архитектура?», «Цель?».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Дизайн и архитектура — одно и то же
    application: архитектор — не противопоставлять «архитектурные» и «дизайнерские»
      решения как разные виды деятельности.
  open_questions: []
- id: CLAR-002
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: цель архитектуры программного обеспечения — уменьшить человеческие трудозатраты
    на создание и сопровождение системы; мерой качества служат трудозатраты на удовлетворение
    потребностей клиента на протяжении жизни системы.
  excerpt: глава 1, раздел «Цель?».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Цель архитектуры — минимизировать трудозатраты
    application: архитектор, менеджер проекта — критерий оценки архитектурных решений.
  open_questions: []
- id: CLAR-003
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: вера в то, что грязный код ускоряет выход на рынок, ложна; создание беспорядка
    всегда медленнее неуклонного соблюдения чистоты в любом масштабе времени, а продуктивность
    при накоплении беспорядка стремится к нулю.
  excerpt: глава 1, разделы «Что не так?», «Пример из практики».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Беспорядок замедляет сильнее, чем дисциплина
    application: разработчик, менеджер проекта — обоснование инвестиций в качество
      кода.
  open_questions: []
- id: CLAR-004
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: та же самонадеянность, что привела к беспорядку, приведёт к такому же беспорядку
    при полном перепроектировании системы; «начать всё заново» само по себе не решает
    проблему.
  excerpt: глава 1, раздел «Что не так?».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Перепроектирование с нуля не спасает
    application: архитектор, менеджер проекта — осторожность к переписыванию «с чистого
      листа».
  open_questions: []
- id: CLAR-005
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: всякая программная система имеет две ценности — поведение (что система делает)
    и структуру (насколько легко её менять); разработчики отвечают за обе, но часто
    жертвуют структурой ради поведения.
  excerpt: глава 2, разделы «Поведение», «Архитектура».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: 'Две ценности ПО: поведение и структура'
    application: архитектор, разработчик — осознанный баланс двух ценностей.
  open_questions: []
- id: CLAR-006
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: правильно работающая, но неизменяемая программа в итоге становится бесполезной
    при изменении требований; неправильно работающая, но легко изменяемая программа
    остаётся полезной — поэтому в долгосрочной перспективе структура важнее поведения.
  excerpt: глава 2, раздел «Наибольшая ценность».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Структура важнее поведения в долгую
    application: архитектор — аргументация приоритета сопровождаемости.
  open_questions: []
- id: CLAR-007
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: в хорошей системе сложность изменения пропорциональна масштабу изменения,
    а не его форме; рост стоимости из-за несоответствия формы системы форме запроса
    — признак архитектурной проблемы, поэтому архитектура должна быть максимально
    независимой от формы.
  excerpt: глава 2, раздел «Архитектура».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Сложность изменения должна зависеть от масштаба, а не от формы
    application: архитектор — диагностика деградации архитектуры по росту стоимости
      однотипных изменений.
  open_questions: []
- id: CLAR-008
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: поведение срочно, но не всегда важно; архитектура важна, но не всегда срочна;
    ошибка руководителей и разработчиков — поднимать срочное и не важное (поведение)
    над важным и не срочным (архитектурой); защита приоритета архитектуры — обязанность
    команды разработки как заинтересованной стороны.
  excerpt: глава 2, разделы «Матрица Эйзенхауэра», «Битва за архитектуру».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Матрица важности и срочности
    application: архитектор, менеджер проекта — обоснование выделения ресурсов на
      структуру.
  open_questions: []
- id: CLAR-009
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: 'существуют три парадигмы — структурная, объектно-ориентированная и функциональная;
    каждая не добавляет возможностей, а отнимает: накладывает ограничение соответственно
    на прямую передачу управления, косвенную передачу управления и присваивание; новых
    парадигм такого рода ожидать не стоит.'
  excerpt: глава 3, разделы «Обзор парадигм», «Пища для ума».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Три парадигмы только ограничивают
    application: архитектор — понимание природы дисциплин кода как ограничений.
  open_questions: []
- id: CLAR-010
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: 'полиморфизм (ОО) используется для преодоления архитектурных границ, функциональное
    программирование — для ограничений на расположение и доступ к данным, структурное
    — как алгоритмическая основа модулей; это соответствует трём аспектам: функциональности,
    разделению компонентов и управлению данными.'
  excerpt: глава 3, раздел «Заключение».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Связь парадигм с тремя аспектами архитектуры
    application: архитектор — отображение парадигм на архитектурные задачи.
  open_questions: []
- id: CLAR-011
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: ограничение управления тремя структурами (последовательность, выбор, итерация)
    позволяет рекурсивно разлагать программу на доказуемые единицы и применять функциональную
    декомпозицию; главная ценность — возможность создавать единицы, неправильность
    которых можно доказать (протестировать).
  excerpt: глава 4, разделы «Функциональная декомпозиция», «Заключение».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Структурное программирование делает модули доказуемыми
    application: архитектор, разработчик — обоснование декомпозиции на тестируемые
      единицы.
  open_questions: []
- id: CLAR-012
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: правильность программы нельзя доказать, как теорему; тестирование показывает
    присутствие ошибок, а не их отсутствие; мы считаем код достаточно правильным,
    потерпев неудачу в попытке доказать его неправильность, — это научный, а не математический
    метод.
  excerpt: глава 4, разделы «Наука во спасение», «Тестирование».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Разработка ПО ближе к науке, чем к математике
    application: архитектор, разработчик — отношение к роли тестов.
  open_questions: []
- id: CLAR-013
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: для архитектора ценность объектно-ориентированного программирования сводится
    к надёжному полиморфизму, дающему абсолютный контроль над направлением зависимостей
    в исходном коде; инкапсуляция и наследование не уникальны для ОО.
  excerpt: глава 5, разделы «Инкапсуляция?», «Наследование?», «Заключение».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: ОО — это абсолютный контроль над направлением зависимостей
    application: архитектор — понимание, что даёт ОО на уровне архитектуры.
  open_questions: []
- id: CLAR-014
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: полиморфизм позволяет обратить любую зависимость исходного кода, направив
    её против потока управления (добавлением интерфейса); это делает возможным архитектуру
    плагинов, где база данных и интерфейс зависят от бизнес-правил, а не наоборот.
  excerpt: глава 5, разделы «Инверсия зависимости» (опирается на рис. 5.1–5.3).
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Инверсия зависимости через полиморфизм
    application: архитектор — ключевой механизм управления зависимостями.
  open_questions: []
- id: CLAR-015
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: возможность обращать зависимости позволяет компилировать бизнес-правила, интерфейс
    и базу данных в независимо развёртываемые компоненты и, как следствие, разрабатывать
    их независимыми командами.
  excerpt: глава 5, раздел «Заключение».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Независимость развёртывания и разработки через ОО
    application: архитектор, менеджер проекта — связь архитектуры и организации команд.
  open_questions: []
- id: CLAR-016
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: все состояния гонки, взаимоблокировки и проблемы одновременного обновления
    обусловлены изменяемостью переменных; разумно помещать как можно больше кода в
    неизменяемые компоненты и как можно меньше — в изменяемые, защищённые транзакционной
    памятью.
  excerpt: глава 6, разделы «Неизменяемость и архитектура», «Ограничение изменяемости».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Неизменяемость устраняет проблемы конкуренции
    application: архитектор — проектирование систем с конкурентным выполнением.
  open_questions: []
- id: CLAR-017
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: регистрация событий (event sourcing) сохраняет транзакции, а не состояние,
    и вычисляет состояние применением транзакций; при достаточных ресурсах это делает
    приложение полностью неизменяемым и функциональным, устраняя проблемы конкурирующих
    обновлений.
  excerpt: глава 6, раздел «Регистрация событий».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Регистрация событий как функциональный подход к хранению
    application: архитектор — вариант стратегии хранения без изменяемого состояния.
  open_questions: []
- id: CLAR-018
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: принципы SOLID определяют, как объединять функции и данные в классы и как
    классы должны сочетаться; цель — структуры среднего уровня, терпимые к изменениям,
    понятные и пригодные для повторного использования; «класс» здесь — любой механизм
    группировки, не только ОО-класс.
  excerpt: глава III (вступление «Принципы дизайна»).
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Назначение SOLID
    application: архитектор, разработчик — область действия SOLID.
  open_questions: []
- id: CLAR-019
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: принцип единственной ответственности (SRP) гласит, что модуль должен иметь
    одну причину для изменения, то есть отвечать за одного и только одного актора
    (группу заинтересованных лиц); это не то же самое, что «функция делает что-то
    одно».
  excerpt: глава 7, разделы «Принцип единственной ответственности».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: 'SRP: одна причина для изменения — один актор'
    application: архитектор, разработчик — правильное понимание SRP.
  open_questions: []
- id: CLAR-020
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: объединение кода разных акторов в одном модуле ведёт к непреднамеренному дублированию
    (изменение для одного актора ломает работу другого) и к рискованным слияниям;
    решение — разделять код, от которого зависят разные акторы (например, выделением
    классов и применением «Фасада»).
  excerpt: 'глава 7, разделы «Признак 1: непреднамеренное дублирование», «Признак
    2: слияния», «Решения».'
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Признаки нарушения SRP
    application: разработчик, архитектор — диагностика и устранение нарушений SRP.
  open_questions: []
- id: CLAR-021
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: на уровне функций и классов это SRP, на уровне компонентов он превращается
    в принцип согласованного изменения (CCP), а на архитектурном уровне — в принцип
    оси изменения, отвечающий за границы.
  excerpt: глава 7, раздел «Заключение».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: SRP проявляется на трёх уровнях
    application: архитектор — связь SRP, CCP и архитектурных границ.
  open_questions: []
- id: CLAR-022
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: принцип открытости/закрытости (OCP) требует, чтобы поведение можно было расширять
    без изменения существующего кода; если простое расширение требований ведёт к большим
    изменениям, архитекторы потерпели неудачу.
  excerpt: глава 8, разделы «Принцип открытости/закрытости».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: 'OCP: открытость для расширения, закрытость для изменения'
    application: архитектор, разработчик — критерий расширяемости.
  open_questions: []
- id: CLAR-023
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: на архитектурном уровне OCP достигается разделением функциональностей по причинам
    изменения и организацией их в иерархию компонентов так, что компоненты верхнего
    уровня защищены от изменений в нижних; чтобы защитить компонент A от изменений
    в B, B должен зависеть от A.
  excerpt: глава 8, разделы «Мысленный эксперимент», «Заключение» (опирается на рис.
    8.2–8.3).
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: 'OCP на уровне архитектуры: иерархия защиты по уровням'
    application: архитектор — упорядочение зависимостей для защиты ценных компонентов.
  open_questions: []
- id: CLAR-024
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: транзитивные зависимости нарушают принцип «не зависеть от того, что не используешь
    непосредственно»; интерфейсы нужны не только чтобы защитить высокоуровневый компонент,
    но и чтобы скрыть его детали от низкоуровневого.
  excerpt: глава 8, разделы «Сокрытие информации».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: Сокрытие информации защищает и в обратную сторону
    application: архитектор — двусторонняя защита через интерфейсы.
  open_questions: []
- id: CLAR-025
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: принцип подстановки Барбары Лисков (LSP) требует, чтобы объекты подтипа можно
    было подставить вместо базового типа без изменения поведения программы; классический
    контрпример — квадрат как подтип прямоугольника.
  excerpt: глава 9, разделы «Принцип подстановки Барбары Лисков», «Проблема квадрат/прямоугольник».
  artifact: clean-architecture-martin-ru.txt
  checked_at: '2026-06-24'
  scope:
    section_title: 'LSP: взаимозаменяемость подтипов'
    application: разработчик, архитектор — проектирование иерархий и интерфейсов.
  open_questions: []
- id: CLAR-026
  source_id: CLAR
  item_id: CLAR-text
  kind: fact
  status: ready_for_review
  text: LSP применим не только к наследованию, но и к интерфейсам и службам (например,
    REST); нарушение взаимозаменяемости заставляет добавлять особые случаи (условия
    if) и засоряет архитектуру дополнительными механизмами.
