- id: PPRX-004
  source_id: PPRX
  item_id: PPRX-designing-refining-maintaining-agent-skills
  status: ready_for_review
  text: добавление нового навыка создаёт постоянную стоимость для системы, поэтому
    необходимость навыка нужно проверять через задачи, где агент без навыка ошибается
    или работает нестабильно.
  excerpt: единица источника описывает навык как контекстную стоимость и рекомендует
    начинать с запросов без навыка, чтобы понять, нужен ли он.
  artifact: index.html
