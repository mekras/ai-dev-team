  item_id: PPRX-designing-refining-maintaining-agent-skills
  status: ready_for_review
  text: раздел с неочевидными ошибками и отрицательными примерами может быть ценным
    механизмом сопровождения навыка, если он пополняется по реальным сбоям агента.
  excerpt: единица источника описывает пополнение gotchas по случаям, когда агент
