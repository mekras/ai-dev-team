- id: CYDX-002
  source_id: CYDX
  item_id: CYDX-normalized-CYDX-source.md
  kind: fact
  status: ready_for_review
  text: 'стандарт поддерживает несколько видов BOM: SBOM (состав ПО), SaaSBOM (сервисы),
    HBOM (аппаратура), ML-BOM (модели ML), CBOM (криптография) и другие.'
  excerpt: обзор видов BOM.
  artifact: source.md
