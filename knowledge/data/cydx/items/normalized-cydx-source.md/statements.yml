- id: CYDX-003
  source_id: CYDX
  item_id: CYDX-normalized-CYDX-source.md
  kind: fact
  status: ready_for_review
  text: документ BOM описывает компоненты (с лицензией и происхождением), сервисы,
    прямые и транзитивные зависимости, известные уязвимости с поддержкой VEX и процессы
    сборки/развёртывания (formulation).
  excerpt: содержимое спецификации.
