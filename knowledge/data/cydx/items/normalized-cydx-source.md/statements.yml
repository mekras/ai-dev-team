  text: CycloneDX — полнофункциональный стандарт Bill of Materials (BOM) для управления
    рисками цепочки поставок ПО; на дату включения актуальна версия 1.7`, стандарт
    опубликован как `ECMA-424`.
  excerpt: обзор спецификации.
  artifact: source.md
