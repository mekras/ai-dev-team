- id: CYDX-004
  source_id: CYDX
  item_id: CYDX-normalized-CYDX-source.md
  kind: inference
  status: ready_for_review
  text: CycloneDX служит основанием для SCA и SBOM в навыке security-tooling` и связан
    с практикой проверки компонентов SSDF (`PW.4`); он дополняет учтённый в корпусе
    стандарт `SPDX`, не заменяя его. Версию сверять по каноническому адресу.
  excerpt: назначение и сопоставление.
  artifact: source.md
  checked_at: '2026-06-25'
  scope:
