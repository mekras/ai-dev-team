- id: DDIA-002
  source_id: DDIA
  item_id: DDIA-normalized-DDIA-source.md
  status: ready_for_review
  text: дефект (fault) — отклонение компонента от спецификации; отказ (failure) —
    прекращение работы системы; отказоустойчивые системы спроектированы справляться
    с дефектами, не доводя их до отказа.
  excerpt: глава 1, определения fault/failure.
  artifact: source.md
  checked_at: '2026-06-26'
  scope:
    section_title: Дефект и отказ
    application: архитектор, аналитик.
  open_questions: []
