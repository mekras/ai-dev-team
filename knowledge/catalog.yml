sources:
  - id: APIB
    title: "Локальная PDF-книга `API` (`The API Book`) Сергея Константинова о проектировании, развитии и продуктовом сопровождении программных интерфейсов. Книга распространяется автором по открытой лицензии `CC BY-NC 4.0`."
    path: data/apib
  - id: AR12
    title: "Внешний публичный научный источник `arXiv` о влиянии `AGENTS.md` на эффективность AI-кодинга."
    path: data/ar12
  - id: AR26
    title: "Внешний публичный научный источник `arXiv` о полезности `AGENTS.md` для эффективности AI-ассистента на уровне репозитория."
    path: data/ar26
  - id: AR42
    title: "Внешний публичный файловый источник arc42 с распакованным AsciiDoc-шаблоном документации."
    path: data/ar42
  - id: ASKL
    title: "Внешний публичный веб-источник о создании, описании и оценке навыков агентов."
    path: data/askl
  - id: ASVS
    title: "Стандарт `OWASP Application Security Verification Standard 4.0.3` (2021) — открытый каталог проверяемых требований безопасности веб-приложений и сервисов и основа для их верификации."
    path: data/asvs
  - id: ATCK
    title: "`MITRE ATT&CK` — база знаний тактик, техник и процедур (TTP) злоумышленников по доменам Enterprise, Mobile, ICS."
    path: data/atck
  - id: BSIM
    title: "`BSIMM` (Building Security In Maturity Model) — модель зрелости на основе наблюдаемых практик реальных организаций; ежегодный отчёт."
    path: data/bsim
  - id: C4M
    title: "Внешний публичный веб-источник: сайт методологии `C4 model`, включающий главную страницу и все содержательные страницы раздела."
    path: data/c4m
  - id: CCMP
    title: "Локальная PDF-книга `Совершенный код. Мастер-класс` Стива Макконнелла, русское издание книги `Code Complete, Second Edition`."
    path: data/ccmp
  - id: CHAE
    title: "Статья `Chaos Engineering` (A. Basiri, N. Behnam, R. de Rooij, L. Hochstein, L. Kosewski, J. Reynolds, C. Rosenthal), препринт на arXiv `1702.05843`, версия статьи `IEEE Software`, 2016. Описание дисциплины инженерии хаоса как метода проверки устойчивости систем через управляемые отказы."
    path: data/chae
  - id: CHAL
    title: "Внешний публичный сайт `Choose a License`, включающий обзорную страницу выбора лицензии и страницу каталога лицензий."
    path: data/chal
  - id: CHEN
    title: "Книга `Хаос-инжиниринг` Кейси Розенталя и Норы Джонс (ДМК Пресс, 2021), русский перевод книги `Chaos Engineering: System Resiliency in Practice` (O’Reilly, 2020). Практика инженерии хаоса: принципы, зрелость, примеры из индустрии."
    path: data/chen
  - id: CLAR
    title: "Локальная EPUB-книга `Чистая архитектура. Искусство разработки программного обеспечения` Роберта Мартина."
    path: data/clar
  - id: CLCD
    title: "Локальная PDF-книга `Чистый код: создание, анализ и рефакторинг` Роберта Мартина, русское издание книги `Clean Code`."
    path: data/clcd
  - id: CODX
    title: "Внешний публичный веб-источник с официальной документацией OpenAI о `AGENTS.md` для Codex."
    path: data/codx
  - id: CVSS
    title: "`CVSS v4.0` (Common Vulnerability Scoring System) — открытая методика оценки серьёзности уязвимостей, управляемая FIRST."
    path: data/cvss
  - id: CYDX
    title: "`OWASP CycloneDX` — стандарт Bill of Materials (SBOM и смежные BOM) для управления рисками цепочки поставок ПО; версия `1.7`, стандарт `ECMA-424`."
    path: data/cydx
  - id: DDDE
    title: "Локальная PDF-книга `Предметно-ориентированное проектирование (DDD). Структуризация сложных программных систем` Эрика Эванса."
    path: data/ddde
  - id: DDIA
    title: "Книга `Designing Data-Intensive Applications` Мартина Клеппманна (O’Reilly, первое издание, 2017). Надёжность, масштабируемость и сопровождаемость данных-ёмких систем: репликация, согласованность, обработка отказов."
    path: data/ddia
  - id: DSCT
    title: "Статья `Basic Concepts and Taxonomy of Dependable and Secure Computing` (A. Avizienis, J.-C. Laprie, B. Randell, C. Landwehr), `IEEE Transactions on Dependable and Secure Computing`, том 1, № 1, 2004, с. 11–33. Опорная таксономия надёжности и безопасности систем."
    path: data/dsct
  - id: ESWO
    title: "Книга Нэнси Левесон `Engineering a Safer World: Systems Thinking Applied to Safety` (MIT Press, 2011). Системный подход к безопасности и надёжности на основе теории систем; модель `STAMP` и метод анализа опасностей `STPA`."
    path: data/eswo
  - id: ETL5
    title: "Отчёт `ENISA Threat Landscape 2025` — ежегодный аналитический обзор ландшафта угроз агентства ЕС по кибербезопасности за период `1 июля 2024 — 30 июня 2025`."
    path: data/etl5
  - id: EVAR
    title: "Локальная PDF-книга `Эволюционная архитектура. Поддержка непрерывных изменений` (`Building Evolutionary Architectures`) Нила Форда, Ребекки Парсонс и Патрика Куа."
    path: data/evar
  - id: G250
    title: "`ГОСТ Р ИСО/МЭК 25010-2015. Информационные технологии. Системная и программная инженерия. Требования и оценка качества систем и программного обеспечения (SQuaRE). Модели качества систем и программных продуктов`. Идентичен `ISO/IEC 25010:2011`."
    path: data/g250
  - id: G272
    title: "`ГОСТ 27.002-2015. Надёжность в технике. Термины и определения`. Межгосударственный стандарт с базовой русскоязычной терминологией надёжности."
    path: data/g272
  - id: GHAB
    title: "Внешний публичный веб-источник: пост GitHub о практиках `agents.md` по опыту более 2 500 репозиториев."
    path: data/ghab
  - id: GIST
    title: "Внешний публичный материал платформы GitHub Gist: практические рекомендации по `AGENTS.md`."
    path: data/gist
  - id: GPLQ
    title: "Внешний публичный FAQ GNU о GPL."
    path: data/gplq
  - id: GSRE
    title: "Книги Google по эксплуатационной надёжности на сайте `sre.google`: `Site Reliability Engineering` (2016) и `The Site Reliability Workbook` (2018). Практика `SLO`, `SLI`, бюджетов ошибок, эксплуатации и управления инцидентами."
    path: data/gsre
  - id: HSRE
    title: "`Handbook of Software Reliability Engineering` под редакцией Майкла Лю (Michael R. Lyu), IEEE Computer Society Press и McGraw-Hill, 1996. Свод классической инженерии надёжности ПО: модели роста надёжности, операционные профили, метрики, отказоустойчивость."
    path: data/hsre
  - id: HWD
    title: "Внешний публичный источник с документационными материалами из репозитория `mekras/hwd`, ограниченный подкаталогом `src/pages`."
    path: data/hwd
  - id: INMA
    title: "Локальная PDF-книга Алана Купера `Психбольница в руках пациентов`, русский перевод книги `The Inmates Are Running the Asylum`."
    path: data/inma
  - id: LFSP
    title: "Внешний публичный PDF-документ Linux Foundation: `Open Source License Best Practices`."
    path: data/lfsp
  - id: MSDL
    title: "`Microsoft Security Development Lifecycle (SDL)` — методология встраивания безопасности в разработку, выраженная набором практик по этапам ЖЦ."
    path: data/msdl
  - id: MWAT
    title: "Связанные таксономии MITRE: `CWE` (слабости ПО/аппаратуры) и `CAPEC` (шаблоны атак). Учтены одним источником как пара."
    path: data/mwat
  - id: O523
    title: "Внешний публичный текст спецификации `OpenChain Specification`, функционально соответствующей `ISO/IEC 5230:2020`."
    path: data/o523
  - id: ODCM
    title: "Внешний публичный набор страниц Open Data Commons о лицензиях для данных и баз данных."
    path: data/odcm
  - id: OSIL
    title: "Внешняя публичная страница Open Source Initiative со списком OSI Approved Licenses."
    path: data/osil
  - id: OWTT
    title: "`OWASP Top 10` (редакция `2021`) — перечень наиболее критичных рисков безопасности веб-приложений для повышения осведомлённости."
    path: data/owtt
  - id: PHSC
    title: "Внешний публичный блог с практическими рекомендациями по написанию `AGENTS.md`."
    path: data/phsc
  - id: PPRX
    title: "Внешний публичный веб-источник `Perplexity Research`."
    path: data/pprx
  - id: RADR
    title: "Локальная PDF-книга `REST API Design Rulebook` Марка Массе (Mark Massé), изданная O’Reilly в `2012` году. Книга построена как свод именованных правил проектирования веб-ориентированных REST API."
    path: data/radr
  - id: REUS
    title: "Внешний публичный набор страниц проекта REUSE о спецификации, версиях спецификации и практических вопросах применения."
    path: data/reus
  - id: RTZ
    title: "Локальная PDF-книга `Программное обеспечение для компьютерных систем и сетей. Разработка технического задания` авторов В.И. Дужего, А.В. Волкового, А.А. Волковой, А.А. Галькевича и А.С. Годунова."
    path: data/rtz
  - id: SAHP
    title: "Локальная PDF-книга `Современный подход к программной архитектуре: сложные компромиссы` (`Software Architecture: The Hard Parts`) Нила Форда, Марка Ричардса, Прамода Садаладжа и Жамак Дехгани."
    path: data/sahp
  - id: SAMM
    title: "Основная модель `OWASP SAMM v2.0` (Software Assurance Maturity Model, 2020) — открытая модель оценки и улучшения программы безопасной разработки ПО."
    path: data/samm
  - id: SMAS
    title: "Локальная PDF-копия отчёта O’Reilly `Securing Microservice APIs: Sustainable and Scalable Access Control` (Matt McLarty, Rob Wilson, Scott Morrison), изданного в `2018` году. Отчёт предлагает платформонезависимую модель управления доступом к веб-API в микросервисной архитектуре."
    path: data/smas
  - id: SMFR
    title: "Локальная DjVu-книга Алистера Коберна `Современные методы описания функциональных требований к системам`, русское издание книги `Writing Effective Use Cases`."
    path: data/smfr
  - id: SPDX
    title: "Внешний публичный набор справочных страниц SPDX о списке лицензий, исключениях, выражениях лицензий и правилах сопоставления текста лицензий."
    path: data/spdx
  - id: SREQ
    title: "Локальная PDF-книга `Разработка требований к программному обеспечению. 3-е изд., дополненное` Карла Вигерса и Джой Битти."
    path: data/sreq
  - id: SSDF
    title: "Документ NIST `SP 800-218` (Secure Software Development Framework, версия 1.1, 2022) — набор практик безопасной разработки ПО высокого уровня, не привязанных к методологии или инструменту."
    path: data/ssdf
  - id: TMDS
    title: "Локальная PDF-копия книги `Threat Modeling: Designing for Security` Адама Шостака (Adam Shostack), изданной Wiley в `2014` году. Книга — системное руководство по моделированию угроз для разработчиков ПО."
    path: data/tmds
  - id: TODO
    title: "Внешний публичный методический материал TODO Group: `Using open source code`."
    path: data/todo
  - id: VSCD
    title: "Внешний публичный веб-источник: документация Visual Studio Code о custom instructions."
    path: data/vscd
  - id: WCAG
    title: "`Web Content Accessibility Guidelines (WCAG) 2.2` — рекомендация W3C по доступности цифрового контента. Организует требования вокруг четырёх принципов (воспринимаемость, управляемость, понятность, надёжность) и задаёт проверяемые критерии успеха с уровнями соответствия `A`, `AA`, `AAA`."
    path: data/wcag
  - id: WSTG
    title: "`OWASP Web Security Testing Guide` — открытое руководство по тестированию безопасности веб-приложений и сервисов (методология и каталог тестов `WSTG-*`)."
    path: data/wstg
  - id: WTDG
    title: "Внешний публичный веб-источник: раздел `guide/` сайта `Write the Docs`, включающий обзорную страницу и связанные внутренние страницы, на которые она указывает."
    path: data/wtdg
  - id: XEM7
    title: "Внешний публичный источник на платформе X: пост пользователя `EXM7777` со ссылкой на связанную X Article."
    path: data/xem7
