# Шаблон карточки источника.
# Скопируйте файл в data/<source>/source.yml.

id: SOURCE-ID
slug: source-slug
title: "Название источника"
status: draft # approved | draft | deprecated | blocked
priority: normal # high | normal | low
platform: other # website | forum | document | channel | interview | api | export | other
kind: external_source
adapter: manual

url: "https://example.org/"
locator: "https://example.org/"
public_reference: "https://example.org/"
license_or_terms: unknown

access:
  default: "Текстовое описание доступа по умолчанию для единиц источника."
reliability: unchecked # canonical | official | working | media | personal | unchecked
stability: mutable # stable | mutable | unknown
refresh_policy: manual # none | manual | periodic | event-driven
refresh_interval_days:

retrieved_at: YYYY-MM-DD
last_checked_at: YYYY-MM-DD
checked_by:
content_hash:

scope:
  includes: []
  excludes: []

known_limitations: []
processing_notes: []
