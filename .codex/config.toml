[features]
enable_fanout = true
multi_agent = true

[agents]
max_threads = 2
max_depth = 1
job_max_runtime_seconds = 900

[routing]
default_model = "gpt-5.4"
default_reasoning_effort = "medium"
evidence_model = "gpt-5.3-codex-spark"
evidence_reasoning_effort = "low"
analysis_model = "gpt-5.4-mini"
analysis_reasoning_effort = "medium"
review_model = "gpt-5.5"
review_reasoning_effort = "high"

[routing.limit_classes]
common = ["gpt-5.4", "gpt-5.4-mini", "gpt-5.5"]
separate = ["gpt-5.3-codex-spark"]
